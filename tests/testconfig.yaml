# Test Configuration for Beckn Protocol Specifications
# This file contains all test configuration parameters for the test toolchain

# RFC Template structure
rfc_template_structure:
  test: true  # true / false
  order_of_headings:
    - heading: "# Heading Name 1"
      subheadings:
        - "## Subheading Name 1.1"
    - heading: "# Heading Name 2"
      subheadings:
        - "## Subheading Name 2.1"

# Open API Syntax
open_api_syntax:
  # beckn.yaml configuration 
  beckn_yaml: 
    docpath: "../api/v2.1/beckn.yaml"
    order_of_fields:
      - "description"
      - "type"
      - "properties"
      - "required"
      - "additionalProperties"
      - "x-jsonld"
    ref_base_url: "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/"
    expected_extended_parameters:
      - "x-jsonld"
  
  # attributes.yaml configuration
  schema:
    docpath: '../schema/core/v2.1/'
    attributes:
      filename: "attributes.yaml"
      order_of_fields:
        - "description"
        - "type"
        - "properties"
        - "required"
        - "additionalProperties"
        - "x-jsonld"
      ref_base_url: "#/components/schemas/"
      expected_extended_parameters:
        - "x-jsonld"
    context:
      filename: "context.jsonld"
      target_context_url: "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/" 
      ref_base_url: "#/components/schemas/"
      expected_extended_parameters:
        - "x-jsonld"
    vocab_jsonld:
      filename: "vocab.jsonld"
      order_of_fields:
        - "description"
        - "type"
        - "properties"
        - "required"
        - "additionalProperties"
        - "x-jsonld"
      ref_base_url: "#/components/schemas/"
      expected_extended_parameters:
        - "x-jsonld"
    

# Examples validation
examples_validation:
  path: "../examples/v2.1/"



################################################################################
# AGENTIC WORKFLOW CONFIGURATIONS
################################################################################
# This section contains configurations for AI-powered agentic tests that use
# Large Language Models (LLMs) to perform sophisticated validation tasks such as
# ambiguity detection, logical fallacy checks, language quality assessment, and
# use-case specific validation. These tests are more resource-intensive and
# require API access to AI models.
#
# All agentic workflows are currently DISABLED (test: false) by default.
# Enable them selectively based on your testing requirements and API availability.
################################################################################

agentic_workflows:
  # AI Model Configuration
  # Specifies which LLM model to use for all agentic tests
  models_used:
    - "gpt-5.1-pro"
  
  # Ambiguity Test
  # Uses AI to detect ambiguous language, unclear definitions, or vague statements
  # in the protocol specifications that could lead to implementation inconsistencies
  ambiguity_test:
    test: false  # true / false - DISABLED by default
    link_to_context: "url"
    prompt_chain:
      - "prompt1"
      - "prompt2"
  
  # Logical Fallacy Test
  # Analyzes specifications for logical inconsistencies, circular reasoning,
  # false assumptions, or other logical fallacies that could undermine the protocol
  logical_fallacy_test:
    test: false  # true / false - DISABLED by default
    link_to_context: "url"
    prompt_chain:
      - "prompt1"
      - "prompt2"
  
  # Language Test
  # Comprehensive language quality checks including tautologies, grammar,
  # and proper noun usage to ensure professional documentation standards
  language_test:
    test: false  # true / false - DISABLED by default
    tautology_test: true  # Check for redundant or circular definitions
    grammar_check: true  # Validate grammar and syntax
    proper_noun_test: true  # Ensure proper nouns are correctly capitalized and used
  
  # Style Test
  # Validates that documentation adheres to the project's style guide,
  # ensuring consistency in tone, formatting, and terminology
  style_test:
    test: false  # true / false - DISABLED by default
    url_to_style_guide: "url to style guide"
  
  # Use Case Tests
  # Domain-specific validation tests that verify protocol specifications
  # work correctly for real-world use cases across different industries.
  # Each use case can be enabled/disabled independently.
  use_case_tests:
    test: false  # true / false - DISABLED by default (master switch for all use cases)
    use_cases:
      # Mobility: Ride Hailing (e.g., Uber, Lyft-style services)
      mobility_ride_hailing:
        test: false  # true / false - DISABLED by default
        link_to_context: "url"
        link_to_use_cases_folder: "url"
      
      # Mobility: Public Transit (e.g., buses, trains, metro systems)
      mobility_public_transit:
        test: false  # true / false - DISABLED by default
        link_to_context: "url"
        link_to_use_cases_folder: "url"
      
      # Energy: EV Charging (e.g., electric vehicle charging stations)
      energy_ev_charging:
        test: false  # true / false - DISABLED by default
        link_to_context: "url"
        link_to_use_cases_folder: "url"
      
      # Retail: Grocery (e.g., online grocery shopping and delivery)
      retail_grocery:
        test: false  # true / false - DISABLED by default
        link_to_context: "url"
        link_to_use_cases_folder: "url"
      
      # Retail: Food & Beverage (e.g., restaurant delivery, cloud kitchens)
      retail_fnb:
        test: false  # true / false - DISABLED by default
        link_to_context: "url"
        link_to_use_cases_folder: "url"
      
      # Logistics: Hyperlocal Delivery (e.g., last-mile delivery services)
      logistics_hyperlocal_delivery:
        test: false  # true / false - DISABLED by default
        link_to_context: "url"
        link_to_use_cases_folder: "url"
      
      # Logistics: Export (e.g., international shipping and freight)
      logistics_export:
        test: false  # true / false - DISABLED by default
        link_to_context: "url"
        link_to_use_cases_folder: "url"
    
    # Test Report Configuration
    # Specifies where to save the generated test reports
    report:
      output_path: "path relative to repo root"
