          type: array
          items:
            $ref: "https://schema.beckn.io/SpatialConstraint/v2.0"
        media_search:
          $ref: "#/components/schemas/MediaSearch"
      anyOf:
      - required:
        - textSearch
      - required:
        - filters
      - required:
        - spatial
      - required:
        - filters
        - spatial
      additionalProperties: false


