          format: uuid
        status:
          type: string
          const: INACTIVE
        updatedAt:
          type: string
          format: date-time

    MasterBecknContext:
      type: object
      description: Request context for master catalog search (requester is a BAP)
      properties:
        action:
          type: string
          description: Request action (e.g. "catalog_master_search")
        messageId:
          type: string
          format: uuid
        transactionId:
          type: string
          format: uuid
        bapId:
          type: string
        bapUri:
          type: string
          format: uri
        timestamp:
          type: string
          format: date-time

    MasterSearchRequest:
      type: object
      description: |
        Beckn v2.0 master catalog search request.
        The `message` field is required; a missing `message` returns HTTP 400 NACK.
      required: [message]
      properties:
        context:
          $ref: '#/components/schemas/MasterBecknContext'
        message:
          type: object
          properties:
            filters:
              type: object
              description: Search filters (empty lists match all)
              properties:
                networkIds:
                  type: array
                  items:
                    type: string
                  description: Filter by network IDs (empty = all networks)
                  default: []
                schemaTypes:
                  type: array
                  items:
                    type: string
                  description: Filter by schema type URIs (empty = all types)
                  default: []
            pagination:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 20
                  description: Maximum items per page (clamped to [1, 100])
                offset:
                  type: integer
                  minimum: 0
                  default: 0
                  description: Zero-based result offset

    CatalogEnvelope:
      type: object
      description: |
        Full catalog envelope returned in master search responses.
        Sourced from `catalog.json` committed to the master item's bare git repo at index time.
        All published catalog fields (`bppUri`, full `descriptor`, etc.) are present.
      properties:
        id:
          type: string
          description: Catalog identifier
        bppId:
          type: string
        bppUri:
          type: string
          format: uri
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        items:
          type: array
          items:
            type: object
            description: Full item JSON from git (domain-specific shape)
            additionalProperties: true

    MasterSearchResponseContext:
      type: object
      description: Response context for master search — always action on_catalog_master_search
      required: [action, timestamp]
      properties:
        action:
          type: string
          const: on_catalog_master_search
        timestamp:
          type: string
          format: date-time
        messageId:
          type: string
          format: uuid
          description: Echoed from request if present
        transactionId:
          type: string
          format: uuid
          description: Echoed from request if present

    PaginationResult:
      type: object
      required: [total, limit, offset]
      properties:
        total:
          type: integer
          minimum: 0
          description: Total number of matching items
        limit:
          type: integer
          description: Page size used in this response
        offset:
          type: integer
          description: Offset used in this response

    MasterSearchResponse:
      type: object
      required: [context, message]
      properties:
        context:
          $ref: '#/components/schemas/MasterSearchResponseContext'
        message:
          type: object
          required: [catalogs, pagination]
          properties:
            catalogs:
              type: array
              items:
                $ref: '#/components/schemas/CatalogEnvelope'
            pagination:
              $ref: '#/components/schemas/PaginationResult'

    SchemaTypesResponse:
      type: object
      required: [context, message]
      properties:
        context:
          $ref: '#/components/schemas/MasterSearchResponseContext'
        message:
          type: object
          required: [schemaTypes]
          properties:
            schemaTypes:
              type: array
              items:
                type: string
              description: Distinct schema type URIs across all indexed master items

    MasterItemResponse:
      type: object
      description: Single master item wrapped in its catalog envelope
      required: [context, message]
      properties:
        context:
          $ref: '#/components/schemas/MasterSearchResponseContext'
        message:
          type: object
          required: [catalogs]
          properties:
            catalogs:
              type: array
              items:
                $ref: '#/components/schemas/CatalogEnvelope'
              minItems: 1
              maxItems: 1
              description: Single-element array containing the master item's catalog envelope

    MasterNackResponse:
      type: object
      description: NACK response from master resource APIs
      required: [context, status, error]
      properties:
        context:
          $ref: '#/components/schemas/MasterSearchResponseContext'
        status:
          type: string
          const: NACK
        error:
          type: object
          required: [errorCode, errorMessage]
          properties:
            errorCode:
              type: string
              enum:
                - INVALID_REQUEST
                - INVALID_ITEM_ID
                - ITEM_NOT_FOUND
              description: Machine-readable error code
            errorMessage:
              type: string
              description: Human-readable error description

    PullMode:
      type: string
      enum: [FULL, INCREMENTAL]
      description: |
        - `FULL` — returns the latest version of each matching catalog.
        - `INCREMENTAL` — returns all catalog versions indexed between
          `fromDate` and `toDate` (inclusive).

    PullFilter:
      type: object
      description: Optional filters narrowing which catalogs are returned
      properties:
        networkIds:
          type: array
          items:
            type: string
          description: Filter by network IDs (empty = all networks)
          default: []
        schemaTypes:
          type: array
          items:
            type: string
          description: Filter by schema type URIs (empty = all types)
          default: []

    CatalogPullRequest:
      type: object
      description: Request body for POST /catalog/pull
      required: [context, message]
      properties:
        context:
          type: object
          description: Beckn v2.0 pull request context
          required: [version, action, bapUri]
          properties:
            version:
              type: string
              minLength: 1
              description: Protocol version (e.g. "2.0")
            action:
              type: string
              minLength: 1
              description: Beckn action (e.g. "catalog_pull")
            timestamp:
              type: string
              format: date-time
            messageId:
              type: string
              format: uuid
            transactionId:
              type: string
              format: uuid
            bapId:
              type: string
            bapUri:
              type: string
              format: uri
              pattern: '^https?://.*'
              description: BAP base URI — callback will be posted to `{bapUri}/on_catalog_pull`
            ttl:
              type: string
              description: Optional time-to-live for this request (ISO-8601 duration)
        message:
          type: object
          description: Pull request parameters
          required: [mode]
          properties:
            mode:
              $ref: '#/components/schemas/PullMode'
            limit:
              type: integer
              minimum: 1
              description: Maximum number of catalogs to return (server may apply its own cap)
            fromDate:
              type: string
              format: date-time
              description: Inclusive lower bound for INCREMENTAL mode
            toDate:
              type: string
              format: date-time
              description: Inclusive upper bound for INCREMENTAL mode
            catalogIds:
              type: array
              items:
                type: string
              description: Explicit catalog IDs to pull (alternative to filters)
            filters:
              $ref: '#/components/schemas/PullFilter'

    PullAckResponse:
      type: object
      description: Immediate HTTP 200 ACK — processing continues asynchronously
      required: [status, requestId]
      properties:
        status:
          type: string
          const: ACK
        requestId:
          type: string
          format: uuid
          description: UUID v4 generated for this pull request; echoed in callback and result download path

    PullObjectUrl:
      type: object
      description: |
        Present in the callback when the payload exceeds the inline threshold.
        The BAP should GET `url` to download the full result.
      required: [url, format, sizeBytes, checksum]
      properties:
        url:
          type: string
          description: |
            Download URL. For local storage: `/catalog/pull/result/{requestId}/catalogs.json`.
            For GCS: a signed URL with expiry.
        expiresAt:
          type: string
          format: date-time
          description: Expiry timestamp for signed URLs (GCS); absent for local URLs
        format:
          type: string
          enum: [json, json.gz]
          description: File format of the result
        sizeBytes:
          type: integer
          format: int64
          description: Size of the result file in bytes
        checksum:
          type: string
          description: "SHA-256 checksum in the form `sha256:<hex>`"
          example: sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855

    PullCallbackContext:
      type: object
      description: Context block in the async pull callback
      required: [version, action, bapUri, timestamp]
      properties:
        version:
          type: string
        action:
          type: string
          const: on_catalog_pull
        bapId:
          type: string
        bapUri:
          type: string
          format: uri
        timestamp:
          type: string
          format: date-time
        messageId:
          type: string
          format: uuid
        transactionId:
          type: string
          format: uuid

    PullResultFile:
      type: object
      description: |
        JSON body of `GET /catalog/pull/result/{requestId}/catalogs.json`.
        Same structure as the inline `catalog` array in the callback payload —
        a list of distribution-envelope catalog objects.
      properties:
        catalogs:
          type: array
          items:
            type: object
            description: Full catalog distribution envelope (context + message + meta)
            additionalProperties: true

    CatalogAuthErrorResponse:
      type: object
      description: NACK returned when Beckn HTTP Signature verification fails (catalog extension)
      required: [status, error]
      properties:
        status:
          type: string
          const: NACK
        error:
          type: object
          required: [errorCode, errorMessage]
          properties:
            errorCode:
              type: string
              enum:
                - SEC_SIGNATURE_MISSING
                - SEC_SIGNATURE_INVALID
                - SEC_KEY_NOT_FOUND
                - SEC_KEY_EXPIRED_OR_REVOKED
                - SEC_SUBSCRIBER_NOT_FOUND
                - SEC_UNAUTHORIZED_ACTION
                - INVALID_REQUEST
                - NET_INTERNAL_ERROR
              description: Machine-readable Beckn security error code
            errorMessage:
              type: string
              description: Human-readable reason for the auth failure

  # ── Ack schema (shared by Ack, AckNoCallback, NackBadRequest, NackUnauthorized responses) ──
    AckSchema:
      $id: 'https://schema.beckn.io/Ack'
      title: Ack
      oneOf:
        - $ref: 'https://schema.beckn.io/Ack/v2.0'
        - type: object
          properties:
            status:
              description: ACK if the request was accepted; NACK if rejected.
              type: string
              enum:
                - ACK
                - NACK
            signature:
              description: Counter-signature proving the receiver authenticated and processed the inbound request.
              $ref: '#/components/schemas/CounterSignature'
            error:
              description: Optional error detail explaining why no callback will follow.
              $ref: '#/components/schemas/Error'
          required:
            - status
            - signature

  securitySchemes:
    BecknSignature:
      type: http
      scheme: signature
      description: |
        **Beckn HTTP Signature** — Ed25519 asymmetric signature over the request body.

        Verified by the Publish API service using the
        [`beckn-auth-sdk`](https://github.com/manjudr/beck-auth-sdk) against the
        Beckn Registry (`REGISTRY_BASE_URL`). The registry holds each subscriber's
        Ed25519 public key.

        Controlled by the `SIGNATURE_AUTH_ENABLED` environment variable
        (default `true` in production; can be disabled for local development).

        **Endpoints protected (Publish API — applies to all `/beckn/*` routes):**
        `POST /catalog/subscription`, `GET /catalog/subscription`,
        `GET /catalog/subscription/{id}`, `DELETE /catalog/subscription/{id}`.

        **Endpoints protected (Catalog Indexer Job — `BecknAuthFilter` on `/*`):**
        `POST /catalog/master/search`, `GET /catalog/master/schemaTypes`,
        `GET /catalog/master/{masterItemId}`, `POST /catalog/pull`,
        `GET /catalog/pull/result/{requestId}/{filename}`.

        ---

        ### Authorization Header Format

        ```
        Authorization: Signature keyId="{subscriberId}|{uniqueKeyId}|ed25519",
                                  algorithm="ed25519",
                                  created="{unix_epoch_seconds}",
                                  expires="{unix_epoch_seconds}",
                                  headers="(created) (expires) digest",
                                  signature="{base64_ed25519_signature}"
        ```

        | Parameter | Description |
        |-----------|-------------|
        | `keyId` | `{subscriberId}\|{uniqueKeyId}\|ed25519` — all three segments required |
        | `algorithm` | Always `ed25519` |
        | `created` | Unix timestamp (seconds) when the signature was created |
        | `expires` | Unix timestamp (seconds) when the signature expires |
        | `headers` | Always `(created) (expires) digest` |
        | `signature` | Base64-encoded Ed25519 signature of the signing string |

        ### Signing String

        ```
        (created): {unix_epoch_seconds}
        (expires): {unix_epoch_seconds}
        digest: BLAKE-512={base64_blake2b512_hash_of_body}
        ```

        The digest is a **BLAKE2b-512** hash of the raw request body, Base64-encoded.

        ### Error Responses

        | HTTP | `errorCode` | Cause |
        |------|-------------|-------|
        | 400 | `SEC_SIGNATURE_MISSING` | `Authorization` header absent |
        | 400 | `INVALID_REQUEST` | Header present but malformed |
        | 401 | `SEC_SIGNATURE_INVALID` | Signature does not verify, expired, or created in future |
        | 401 | `SEC_KEY_NOT_FOUND` | Key ID not found in registry |
        | 401 | `SEC_KEY_EXPIRED_OR_REVOKED` | Public key expired in registry |
        | 401 | `SEC_SUBSCRIBER_NOT_FOUND` | Subscriber not registered |
        | 401 | `SEC_UNAUTHORIZED_ACTION` | Other auth failure |
        | 500 | `NET_INTERNAL_ERROR` | Registry unreachable or timed out |

        ### Whitelisting

        Endpoints can be exempted per-deployment via the
        `SIGNATURE_WHITELISTED_ENDPOINTS` env var
        (comma-separated `METHOD:/path` entries, e.g. `GET:/catalog/subscription/:id`).

  responses:
    Ack:
      description: Synchronous receipt acknowledgement returned for every accepted Beckn request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckSchema'

    AckNoCallback:
      description: |
        Request received but no callback will follow (e.g. agents not found,
        inventory unavailable, provider closed, context.try preview complete).
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/AckSchema'
              - required:
                  - status
                  - signature
                  - error


    NackBadRequest:
      description: 'NACK — Bad Request: Malformed or invalid request; the server could not parse or validate the payload.'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/AckSchema'
              - type: object
                properties:
                  status:
                    type: string
                    const: NACK
                  error:
                    $ref: '#/components/schemas/Error'

    NackUnauthorized:
      description: Invalid or missing authentication credentials; signature could not be verified.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/AckSchema'
              - type: object
                properties:
                  status:
                    type: string
                    const: NACK
                  error:
                    $ref: '#/components/schemas/Error'

    ServerError:
      description: |
        Internal failure on the network participant's application; the request could not be processed.
        The response body MAY contain an `error` object with additional details.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/Error'

webhooks:
  on_catalog_pull:
    post:
      operationId: onCatalogPull
      tags: [Catalog Pull]
      summary: Async pull result callback
      description: |
        POSTed by the Catalog Indexer Job to `{context.bapUri}/on_catalog_pull`
        when pull processing completes.

        The BAP must expose this endpoint and return `{"status":"ACK"}` (HTTP 200).
        An HTTP 409 response is treated as AckNoCallback — logged and skipped, not an error.

        Exactly one of `message.catalog` (inline) or `message.objectUrl` (large file)
        will be non-null when `message.status` is `COMPLETED`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/PullCallbackContext'
                message:
                  type: object
                  required: [requestId, status]
                  properties:
                    requestId:
                      type: string
                      format: uuid
                      description: Echoed from the pull ACK response
                    status:
                      type: string
                      enum: [COMPLETED, PROCESSING, FAILED]
                      description: |
                        - `COMPLETED` — result available inline or via `objectUrl`.
                        - `PROCESSING` — still running (intermediate callback, rare).
                        - `FAILED` — pull failed; no catalog data.
                    catalog:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                      description: Inline catalog data — present when payload is below the inline threshold
                    objectUrl:
                      $ref: '#/components/schemas/PullObjectUrl'
      responses:
        '200':
          description: ACK — callback received
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ACK
        '409':
          description: AckNoCallback — logged and skipped by Catalg, not retried
