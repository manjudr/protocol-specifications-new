    # ── Catalog extension (subscription, master search, pull) ─────────────────
    BecknContext:
      type: object
      description: Beckn Protocol v2.0 context block (camelCase fields, no coreVersion)
      properties:
        version:
          type: string
          description: Protocol version (e.g. "2.0")
        action:
          type: string
          description: Beckn action identifier
        messageId:
          type: string
          format: uuid
        transactionId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        bapId:
          type: string
          description: BAP identifier
        bapUri:
          type: string
          format: uri
          description: BAP callback base URI
        bppId:
          type: string
          description: BPP identifier
        bppUri:
          type: string
          format: uri
          description: BPP base URI
        networkId:
          type: string
          description: Network identifier (String in v2.0, not a list)

    CatalogDeliveryPolicy:
      type: object
      description: Retry delivery policy for catalog callbacks
      properties:
        retryCount:
          type: integer
          minimum: 0
          description: Maximum number of delivery retry attempts
          example: 3
        retryBackoffMultiplier:
          type: integer
          minimum: 1
          description: Exponential backoff multiplier between retries
          example: 2

    SubscriptionStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
      description: Lifecycle status of a subscription

    SubscriptionDetail:
      type: object
      description: Full subscription record
      required: [id, subscriberId, networkIds, schemaTypes, callbackUrl, deliveryPolicy, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          description: Subscription UUID
        subscriberId:
          type: string
          format: uuid
          description: Internal subscriber UUID
        networkIds:
          type: array
          items:
            type: string
          description: Network IDs covered by this subscription
        schemaTypes:
          type: array
          items:
            type: string
          description: Schema type URIs filtered by this subscription (empty = wildcard "*")
        callbackUrl:
          type: string
          format: uri
          description: Delivery callback URL (derived from bapUri)
        deliveryPolicy:
          $ref: '#/components/schemas/CatalogDeliveryPolicy'
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubscriptionErrorResponse:
      type: object
      description: Error response for subscription endpoints
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - SUB_NOT_FOUND
                - SUB_VALIDATION_FAILED
                - SUB_INTERNAL_ERROR
              description: Machine-readable subscription error code
            message:
              type: string
              description: Human-readable error description

    CatalogSubscribeRequest:
      type: object
      description: Beckn v2.0 catalog_subscribe request body
      required: [context, message]
      additionalProperties: false
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/BecknContext'
            - type: object
              required: [version, action, messageId, transactionId, timestamp, bapId, bapUri]
              properties:
                action:
                  type: string
                  const: catalog_subscribe
        message:
          type: object
          required: [subscription]
          additionalProperties: false
          properties:
            subscription:
              type: object
              description: |
                Subscription filter criteria.
                At least one of `networkIds` or `schemaTypes` must be non-empty.
              additionalProperties: false
              allOf:
                - anyOf:
                    - required: [networkIds]
                      properties:
                        networkIds:
                          type: array
                          items:
                            type: string
                          minItems: 1
                    - required: [schemaTypes]
                      properties:
                        schemaTypes:
                          type: array
                          items:
                            type: string
                          minItems: 1
                - type: object
                  properties:
                    networkIds:
                      type: array
                      items:
                        type: string
                        minLength: 1
                      description: Network IDs to subscribe to (empty = all networks)
                      default: []
                    schemaTypes:
                      type: array
                      items:
                        type: string
                        minLength: 1
                      description: Schema type URIs to filter on (empty = wildcard)
                      default: []
                    deliveryPolicy:
                      $ref: '#/components/schemas/CatalogDeliveryPolicy'

    CatalogSubscribeResponse:
      type: object
      description: Beckn v2.0 on_catalog_subscribe response envelope
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/BecknContext'
            - type: object
              required: [action, timestamp, messageId]
              properties:
                action:
                  type: string
                  const: on_catalog_subscribe
        message:
          type: object
          required: [subscription]
          properties:
            subscription:
              type: object
              required: [id, status, networkIds, schemaTypes, createdAt]
              properties:
                id:
                  type: string
                  format: uuid
                  description: Newly created subscription UUID
                status:
                  $ref: '#/components/schemas/SubscriptionStatus'
                networkIds:
                  type: array
                  items:
                    type: string
                schemaTypes:
                  type: array
                  items:
                    type: string
                createdAt:
                  type: string
                  format: date-time

    ListSubscriptionsResponse:
      type: object
      required: [count, subscriptions]
      properties:
        count:
          type: integer
          minimum: 0
          description: Number of subscriptions returned
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionDetail'

    DeleteSubscriptionResponse:
      type: object
      required: [id, status, updatedAt]
      properties:
        id:
