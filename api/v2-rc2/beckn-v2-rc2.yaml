openapi: 3.1.1
info:
  title: Beckn Protocol V2.0 API Specification
  description: |
    The API specification of Beckn Protocol covering the four stages of an order lifecycle:
    - Discovery: Discovery of catalogs
    - Ordering: Price negotiation, terms negotiation, and order confirmation
    - Fulfillment: Order tracking, status updates, order updates and cancellation
    - Post-fulfillment: Rating, feedback, and customer support
  version: 2.0.0
  contact:
    name: Beckn Protocol
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en

paths:
  /beckn/discover:
    get:
      summary: Discover catalogs on a network
      description: |
        Search and discover catalogs across an open network. This endpoint can be implemented by Catalog Discovery Services, and BPPs. Supports text search, JSONPath-based filtering (RFC 9535), or both together with automatic schema adaptation. This endpoint returns an **ACK/NACK** confirming receipt/validation. Can be implemented by any entity hosting catalogs. 
      operationId: discoverCatalog
      tags: [CDS, BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverRequest'
            examples:
              structured_query:
                $ref: '#/components/examples/discover_structured_query'
              natural_language:
                $ref: '#/components/examples/discover_natural_language'
              grocery_search:
                $ref: '#/components/examples/discover_grocery_search'
              combined_search:
                $ref: '#/components/examples/discover_combined_search'
              multi_schema_search:
                $ref: '#/components/examples/discover_multi_schema_search'
      responses:
        '200':
          description: ACK — Successful acknowledgement of a catalog discovery request. Upon receiving this, the BAP should expect an on_discover callback. 
          content:
            application/json:
              schema:
                $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
          
  /beckn/on_discover:
    post:
      summary: Callback response to `discover` request
      description: |
        Callback endpoint that contains Catalogs hosted by multiple BPPs. This endpoint is called by the BPP to return the search results after processing the discover request. **This endpoint returns only an ACK/NACK** confirming receipt and validation of the catalog payload.
      operationId: onDiscoverCatalog
      tags: [Discovery]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverResponse'
            examples:
              electronic_items_catalog:
                $ref: '#/components/examples/on_discover_electronics_catalog'
              grocery_items_catalog:
                $ref: '#/components/examples/on_discover_grocery_catalog'
      responses:
        '200':
          description: ACK — received catalog data for the corresponding discover request
          content:
            application/json:
              schema:
                $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/AckResponse'
              examples:
                success_ack:
                  $ref: '#/components/examples/ack_success'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  
  /beckn/select:
    post:
      summary: "Buyer selects items/offers — returns priced order"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: select
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_select:
    post:
      summary: Provider returns priced order (quote)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_select
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/init:
    post:
      summary: Initialize order (party details, fulfillment mode, payment intent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: init
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_init:
    post:
      summary: BPP returns final draft of order with terms 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_init
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/confirm:
    post:
      summary: Confirm order (final selections; payment/fulfillment committed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: confirm
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_confirm:
    post:
      summary: Provider returns confirmed order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_confirm
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
                        - type: object
                          required:
                            - beckn:id
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/status:
    post:
      summary: Fetch order status by id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: status
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      oneOf:
                        - type: object
                          additionalProperties: false
                          required:
                            - beckn:id
                          properties:
                            beckn:id:
                              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order/properties/beckn:id'
                        - allOf:
                            - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
                            - type: object
                              required:
                                - beckn:id
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_status:
    post:
      summary: Provider returns current order (or tracking via fulfillment packs)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_status
                message:
                  type: object
                  properties:
                    order:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
                        - type: object
                          required:
                            - beckn:id
                  anyOf:
                    - required:
                        - order
                    - required: []
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/update:
    post:
      summary: Request order mutation (replace, cancel line, address change, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: update
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
                        - type: object
                          required:
                            - beckn:id
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_update:
    post:
      summary: Provider returns mutated order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_update
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
                        - type: object
                          required:
                            - beckn:id
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/cancel:
    post:
      summary: Request to cancel an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: cancel
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      oneOf:
                        - type: object
                          additionalProperties: false
                          required:
                            - beckn:id
                          properties:
                            beckn:id:
                              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order/properties/beckn:id'
                            beckn:orderItems:
                              type: array
                              minItems: 1
                              items:
                                oneOf:
                                  - type: object
                                    required:
                                      - beckn:orderedItem
                                    properties:
                                      beckn:orderedItem:
                                        $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Item/properties/beckn:id'
                                      beckn:lineId:
                                        type: string
                                        description: Unique line id within order
                                      beckn:quantity:
                                        $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Quantity'
                                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/OrderItem'
                        - allOf:
                            - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
                            - type: object
                              required:
                                - beckn:id
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_cancel:
    post:
      summary: Provider returns cancelled order (may reflect refund/payment update via PaymentRef)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - context
                - message
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_cancel
                message:
                  type: object
                  required:
                    - order
                  properties:
                    order:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
                        - type: object
                          required:
                            - beckn:id
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/support:
    post:
      summary: Request support details for an entity (order/item/provider/etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: support
                message:
                  type: object
                  required: [refId, refType]
                  properties:
                    refId:
                      type: string
                      description: ID of the entity for which support is requested (order/item/fulfillment/provider/agent). # legacy kept minimal
                    refType:
                      type: string
                      description: Entity type for which support is requested.
                      enum: [ORDER, FULFILLMENT, ITEM, PROVIDER, AGENT, OTHER]
                    support:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/SupportInfo'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_support:
    post:
      summary: Provider returns support details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_support
                message:
                  type: object
                  required: [support]
                  properties:
                    support:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/SupportInfo'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/track:
    post:
      summary: Request tracking handle/link for an active order/fulfillment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: track
                message:
                  type: object
                  required:
                    - tracking
                  properties:
                    tracking:
                      type: object
                      required:
                        - id
                      properties:
                        id:
                          type: string
                          description: Tracking identifier
                        callbackUrl:
                          type: string
                          format: uri
                          description: Optional callback URL for streaming tracking coordinates/updates
                        mode_hint:
                          type: string
                          description: Optional delivery mode for the tracking handle.
                          enum: [LINK_ONLY, DEEP_LINK, WEBHOOK, WS_HANDLE]
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_track:
    post:
      summary: Provider returns tracking handle/link and status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_track
                message:
                  type: object
                  required:
                    - tracking
                  properties:
                    tracking:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/TrackAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/rating:
    post:
      summary: Submit a rating (optionally with feedback) for an entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: rating
                message:
                  ratings:
                    type: array
                    items:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/RatingInput'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/on_rating:
    post:
      summary: Provider acknowledges/returns rating receipt (optional aggregate snapshot)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/TransactionContext'
                    - type: object
                      properties:
                        action:
                          const: on_rating
                message:
                  type: object
                  properties:
                    received:
                      type: boolean
                      default: true
                    aggregate:
                      type: object
                      description: Optional current aggregate rating snapshot.
                      properties:
                        count:
                          type: integer
                          minimum: 0
                        value:
                          type: number
                          minimum: 0
                        best:
                          type: number
                          minimum: 0
                        worst:
                          type: number
                          minimum: 0
                    feedbackForm:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Form'
                      description: Optional feedback form for additional detailed feedback collection
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/catalog/publish:
    post:
      summary: Publish one or more catalogs for indexing
      description: |
        BPP submits catalogs to be indexed. Returns **ACK** immediately if accepted for processing.
        The detailed per-catalog processing result arrives later via **/on_publish**.
      operationId: publishCatalogs
      tags: [Catalog Publish]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogPublishRequest'
            examples:
              publish_basic:
                summary: Minimal publish
                value:
                  context:
                    version: "2.0.0"
                    action: "catalog_publish"
                    timestamp: "2025-09-01T10:30:00+05:30"
                    message_id: "u-req-123"
                    transactionId: "u-txn-123"
                    bap_id: "bpp.example.com"
                    bap_uri: "https://bpp.example.com/callbacks" # where /on_catalog_publish is exposed
                    ttl: "PT30S"
                  catalogs:
                    - "@context": "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/EvChargingOffer/v1/context.jsonld"
                      "@type": "beckn:Catalog"
                      "beckn:id": "catalog-001"
                      "beckn:descriptor": {"@type": "beckn:Descriptor", "schema:name": "BPP Test Catalog"}
                      "beckn:items": []
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  /beckn/catalog/on_publish:
    post:
      summary: Callback with catalog publish processing results
      description: |
        Discovery Service calls back with per-catalog processing results (accepted/rejected, errors, derived stats).
        The receiver should respond with an **AckResponse**.
      operationId: onCatalogPublish
      tags: [Catalog Publish]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogPublishResponse'
            examples:
              results_basic:
                summary: Example processing results
                value:
                  context:
                    version: "2.0.0"
                    action: "on_catalog_publish"
                    timestamp: "2025-09-01T10:31:05+05:30"
                    message_id: "u-resp-123"
                    transactionId: "u-txn-123"
                    bpp_id: "discovery-indexer.example.com"
                    bpp_uri: "https://discovery-indexer.example.com"
                    ttl: "PT30S"
                  message:
                    results:
                      - catalogId: "catalog-001"
                        status: "ACCEPTED"
                        itemCount: 42
                        warnings:
                          - code: "NON_NORMALIZED_BRAND"
                            message: "Some brand values were normalized"
                      - catalogId: "catalog-002"
                        status: "REJECTED"
                        error:
                          code: "INVALID_ITEM"
                          message: "Invalid item payload at index 3"
                          paths: "catalogs[1].items[3]"
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
components:
  schemas:
    DiscoverRequest:
      type: object
      required: [context]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContext'
            - type: object
              properties:
                action:
                  type: string
                  enum: [discover]
        message:
          type: object
          description: Discover payload containing search criteria
          properties:
            textSearch:
              type: string
              description: Free text search query for items
              example: "gaming laptop premium tech"
            filters:
              type: object
              description: Filter criteria for items
              properties:
                expressionType:
                  type: string
                  enum: [jsonpath]
                  default: jsonpath
                  description: Type of filter expression
                expression:
                  type: string
                  description: Filter expression based on the specified expressionType
                  example: "$[?(@.rating.value >= 4.0 && @.electronic.brand.name == 'Premium Tech')]"
              required: [expressionType, expression]
            spatial:
              type: array
              description: Optional array of spatial constraints (CQL2-JSON semantics).
              items:
                $ref: '#/components/schemas/SpatialConstraint'
            mediaSearch:
              $ref: '#/components/schemas/MediaSearch'
          anyOf:
            - required: [textSearch]
            - required: [filters]
            - required: [spatial]
            - required: [filters, spatial]
    DiscoverResponse:
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContext'
            - type: object
              properties:
                action:
                  type: string
                  enum: [on_discover]
        message:
          type: object
          properties:
            catalogs:
              type: array
              description: Array of catalogs containing items
              items:
                $ref: '#/components/schemas/Catalog'
    DiscoveryContext:
      allOf:
        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications/refs/heads/master/api/transaction/build/transaction.yaml#/components/schemas/Context'
        - type: object
          description: Beckn Context extended for Discovery.
          properties:
            schemaContext:
              type: array
              items:
                type: string
                format: uri
              description: Optional JSON-LD context URLs indicating item types to search across
    GeoJSONGeometry:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/GeoJSONGeometry'
    Address:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Address'
    Location:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Location'
    SpatialConstraint:
      type: object
      description: >
        **Spatial predicate** using **OGC CQL2 (JSON semantics)** applied to one or more geometry targets in an item. This is where clients express spatial intent.

        Key ideas: - `targets`: one or more **JSONPath-like** pointers that locate geometry

          fields within each item document (e.g., `$['beckn:availableAt'][*]['geo']`).
        - `op`: spatial operator (CQL2). Common ones:

            • `S_WITHIN`     (A is completely inside B)
            • `S_INTERSECTS` (A intersects B)
            • `S_CONTAINS`   (A contains B)
            • `S_DWITHIN`    (A within distance of B)
        - `geometry`: **GeoJSON** literal used as the predicate reference geometry. - `distanceMeters`: required for `S_DWITHIN` when using a GeoJSON Point/shape. - `quantifier`: if a target resolves to an array, choose whether **ANY** (default),

          **ALL**, or **NONE** of elements must satisfy the predicate.

        CRS: unless otherwise stated, all coordinates are **EPSG:4326**.

      required: [op, targets]
      properties:
        op:
          type: string
          enum:
            - S_WITHIN
            - S_CONTAINS
            - S_INTERSECTS
            - S_DISJOINT
            - S_OVERLAPS
            - S_CROSSES
            - S_TOUCHES
            - S_EQUALS
            - S_DWITHIN
          description: OGC CQL2 spatial operator.
        targets:
          description: >
            One or more JSONPath-like pointers to geometry fields within the item. Example pointers: - `$['beckn:availableAt'][*]['geo']` (array of site Points) - `$['beckn:itemAttributes']['ride:dropOff']['geo']` (drop zone Polygon)

          oneOf:
            - type: string
            - type: array
              items: {type: string}
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
        distanceMeters:
          type: number
          minimum: 0
          description: >
            For `S_DWITHIN`: maximum distance in meters from the target geometry to `geometry` (e.g., "within 5000 m of this Point"). Ignored for other ops.

        quantifier:
          type: string
          enum: [ANY, ALL, NONE]
          default: any
          description: >
            How to evaluate when `targets` resolves to an array: - **any**: at least one element matches (default) - **all**: every element must match - **none**: no element may match

        srid:
          type: string
          description: >
            Coordinate Reference System identifier for `geometry`. Default is `"EPSG:4326"`. If provided, servers MAY reproject to EPSG:4326 internally.

          example: "EPSG:4326"
      additionalProperties: false
      examples:
        within_circle_as_distance:
          summary: EV sites within 5 km of a center (via S_DWITHIN)
          value:
            op: S_DWITHIN
            targets: "$['beckn:availableAt'][*]['geo']"
            geometry:
              type: Point
              coordinates: [77.5946, 12.9716]
            distanceMeters: 5000
        pickup_at_point:
          summary: Pickup at a defined point (GeoJSON Point)
          description: >
            Example of a DiscoverRequest spatial constraint representing a specific pickup location. The requester defines a GeoJSON Point as the pickup location, and the server finds providers whose service area **contains** this point.

          value:
            op: S_CONTAINS
            targets: "$['beckn:itemAttributes']['ride:serviceArea']['geo']" # provider polygon field
            geometry:
              type: Point
              coordinates: [77.5946, 12.9716] # MG Road (Bengaluru) — [lon, lat]              
        drop_intersects_user_box:
          summary: Provider drop zone intersects user’s rectangle
          value:
            op: S_INTERSECTS
            targets: "$['beckn:itemAttributes']['ride:dropOff']['geo']"
            geometry:
              type: Polygon
              coordinates:
                - [[77.6100, 12.9200], [77.6400, 12.9200], [77.6400, 12.9500], [77.6100, 12.9500], [77.6100, 12.9200]]
        pickup_location_example:
          summary: A defined pickup location object
          value:
            geo:
              type: Point
              coordinates: [77.5946, 12.9716] # [lon, lat]
            address:
              streetAddress: "MG Road"
              addressLocality: "Bengaluru"
              addressRegion: "Karnataka"
              postalCode: "560001"
              addressCountry: "IN"
    MediaSearch:
      type: object
      description: >
        Container for multimodal search inputs and configuration. Supports searching through **images, audio notes, and videos** alongside text, filters, and spatial predicates. For GET, this object should be JSON-encoded and URL-escaped.

      properties:
        media:
          type: array
          description: >
            One or more references to **images, audio notes, or videos** supplied as part of a multimodal search. Each entry references a media resource accessible via HTTPS or data URI.

          items:
            $ref: '#/components/schemas/MediaInput'
          example:
            - id: "snap-1"
              type: image
              url: "https://cdn.example.com/user/snaps/ccs2-cable.jpg"
              contentType: "image/jpeg"
        options:
          $ref: '#/components/schemas/MediaSearchOptions'
          description: >
            Options controlling how the discovery engine interprets the supplied media — e.g., whether to perform OCR/ASR, semantic similarity, or object detection.

      additionalProperties: false
      example:
        media:
          - id: "snap-1"
            type: image
            url: "https://cdn.example.com/user/snaps/ccs2-cable.jpg"
            contentType: "image/jpeg"
        options:
          goals: ["VISUAL_OBJECT_DETECT", "TEXT_FROM_IMAGE"]
          augmentTextSearch: true
    MediaInput:
      type: object
      description: Reference to an image, audio clip, or video used for multimodal search.
      required: [type, url]
      properties:
        id:
          type: string
          description: Client-supplied identifier for this media input.
        type:
          type: string
          enum: [image, audio, video]
          description: Media category.
        url:
          type: string
          format: uri
          description: HTTPS URL or data URI pointing to the media resource.
        contentType:
          type: string
          description: MIME type, e.g., image/jpeg, audio/mpeg, video/mp4.
        textHint:
          type: string
          description: Optional pre-extracted text (OCR/ASR) for search augmentation.
        language:
          type: string
          description: Language code (BCP-47) of `textHint` or spoken audio.
        startMs:
          type: integer
          description: Optional start offset in milliseconds (for audio/video segments).
        endMs:
          type: integer
          description: Optional end offset in milliseconds (for audio/video segments).
      additionalProperties: false
    MediaSearchOptions:
      type: object
      description: How the discovery engine should use the provided media inputs.
      properties:
        goals:
          type: array
          description: >
            Desired processing goals for the media.

          items:
            type: string
            enum:
              - VISUAL_SIMILARITY # find visually similar items
              - VISUAL_OBJECT_DETECT # detect object classes within image/video
              - TEXT_FROM_IMAGE # extract text (OCR)
              - TEXT_FROM_AUDIO # extract text (ASR)
              - SEMANTIC_AUDIO_MATCH # audio embedding similarity
              - SEMANTIC_VIDEO_MATCH # video scene/keyframe similarity
        augmentTextSearch:
          type: boolean
          default: true
          description: >
            Whether to append extracted text from OCR/ASR to `textSearch`.

        restrictResultsToMediaProximity:
          type: boolean
          default: false
          description: >
            Restrict results to spatial proximity of media-derived coordinates (e.g., EXIF GPS tags).

      additionalProperties: false
    AckResponse:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/AckResponse'
    Catalog:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Catalog'
    Item:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Item'
    Offer:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Offer'
    Attributes:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Attributes'
    Provider:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Provider'
    PriceSpecification:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/PriceSpecification'
    Eligibility:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Eligibility'
    Descriptor:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Descriptor'
    CategoryCode:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/CategoryCode'
    TimePeriod:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/TimePeriod'
    Rating:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Rating'
    ErrorResponse:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/ErrorResponse'
    Error:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Error'
    TransactionContext:
      allOf:
        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications/refs/heads/master/api/transaction/build/transaction.yaml#/components/schemas/Context'
        - type: object
          description: >
            Beckn Context extended for Transaction flows. Mirrors DiscoveryContext pattern to enable validation and per-endpoint action constraints. networkId/schemaContext are optional for routing and JSON-LD hints.

          properties:
            networkId:
              type: array
              items: {type: string}
              description: Optional list of addressed networks (for routing/allowlisting)
            schemaContext:
              type: array
              items:
                type: string
                format: uri
              description: Optional JSON-LD context URLs relevant to the items/offers in this transaction
    # --------------------------------
    # Core schemas (referenced from attributes.yaml)
    # --------------------------------
    Order:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Order'
    OrderItem:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/OrderItem'
    Invoice:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Invoice'
    Fulfillment:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Fulfillment'
    TrackAction:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/TrackAction'
    Payment:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Payment'
    Buyer:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Buyer'
    SupportInfo:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/SupportInfo'
    Tracking:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Tracking'
    RatingInput:
      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/RatingInput'
    # ---------- Envelopes ----------
    CatalogPublishRequest:
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContext'
            - type: object
              properties:
                action:
                  type: string
                  enum: [catalog_publish]
        message:
          type: object
          required: [catalogs]
          properties:
            catalogs:
              type: array
              description: Array of catalogs containing items
              items:
                $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Catalog'
              minItems: 1
      description: |
        Catalog Publish request envelope.
        *context.version* MUST indicate the supported protocol version (e.g., "2.0.0").
    CatalogPublishResponse:
      type: object
      required: [context, message]
      properties:
        context:
          allOf:
            - $ref: '#/components/schemas/DiscoveryContext'
            - type: object
              properties:
                action:
                  type: string
                  enum: [on_catalog_publish]
        message:
          type: object
          properties:
            results:
              type: array
              description: Per-catalog processing results
              items:
                $ref: '#/components/schemas/CatalogProcessingResult'
    # ---------- Result model ----------
    CatalogProcessingResult:
      type: object
      required: [catalogId, status]
      properties:
        catalogId:
          type: string
          description: The "beckn:id" of the submitted catalog
        status:
          type: string
          enum: [ACCEPTED, REJECTED, PARTIAL]
          description: Final processing outcome for this catalog
        itemCount:
          type: integer
          minimum: 0
          description: Number of items indexed (when accepted/partial)
        warnings:
          type: array
          description: Non-fatal issues encountered
          items:
            $ref: '#/components/schemas/ProcessingNotice'
        error:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/attributes.yaml#/components/schemas/Error'
    ProcessingNotice:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
  examples:
    # ---------- /discover request examples ----------
    discover_structured_query:
      summary: Structured discover (electronics)
      value:
        context:
          version: "2.0.0"
          action: "discover"
          timestamp: "2024-04-10T16:10:50+05:30"
          message_id: "5c8f1a2b-9d3e-4f76-8b21-3a4c5d6e7f80"
          transactionId: "d3b07384-4a1c-4f5e-9c2b-7e6d5c4b3a21"
          bap_id: "bap.example.com"
          bap_uri: "https://bap.example.com"
          ttl: "PT30S"
          schemaContext:
            - "https://example.org/schema/items/v1/ElectronicItem/schema-context.jsonld"
        message:
          textSearch: "gaming laptop premium tech"
          filters:
            expressionType: "jsonpath"
            expression: "$[?(@.rating.value >= 4 && @.electronic.brand.name == 'Premium Tech')]"
    discover_natural_language:
      summary: Natural-language discover (electronics)
      value:
        context:
          version: "2.0.0"
          action: "discover"
          timestamp: "2024-04-10T16:10:50+05:30"
          message_id: "9a7b6c5d-8e4f-4a3b-9c2d-1e0f2a3b4c5d"
          transactionId: "1f2e3d4c-5b6a-4789-8c0d-1a2b3c4d5e6f"
          bap_id: "bap.example.com"
          bap_uri: "https://bap.example.com"
          ttl: "PT30S"
          schemaContext:
            - "https://example.org/schema/items/v1/ElectronicItem/schema-context.jsonld"
        message:
          textSearch: "Looking for a premium gaming laptop under $2000 near San Francisco"
    discover_grocery_search:
      summary: Structured discover (grocery)
      value:
        context:
          version: "2.0.0"
          action: "discover"
          timestamp: "2024-04-10T16:10:50+05:30"
          message_id: "2a3b4c5d-6e7f-4890-9a1b-2c3d4e5f6071"
          transactionId: "7e6d5c4b-3a21-4c5d-8f70-9a1b2c3d4e5f"
          bap_id: "bap.example.com"
          bap_uri: "https://bap.example.com"
          ttl: "PT30S"
          schemaContext:
            - "https://example.org/schema/items/v1/GroceryItem/schema-context.jsonld"
        message:
          textSearch: "organic apples fresh"
          filters:
            expressionType: "jsonpath"
            expression: "$[?(@.grocery.organicCertification ~ 'USDA Organic')]"
    discover_combined_search:
      summary: Combined text + filters
      value:
        context:
          version: "2.0.0"
          action: "discover"
          timestamp: "2024-04-10T16:10:50+05:30"
          message_id: "3b4c5d6e-7f80-41a2-93b4-c5d6e7f8091a"
          transactionId: "8f70e6d5-c4b3-42a1-9c2d-3e4f5a6b7c8d"
          bap_id: "bap.example.com"
          bap_uri: "https://bap.example.com"
          ttl: "PT30S"
          schemaContext:
            - "https://example.org/schema/items/v1/ElectronicItem/schema-context.jsonld"
        message:
          textSearch: "gaming laptop"
          filters:
            expressionType: "jsonpath"
            expression: "$[?(@.electronic.price['schema:price'] <= 2000 && @.electronic.brand.name == 'Premium Tech')]"
    discover_multi_schema_search:
      summary: Multi-schema discover (electronics + grocery)
      value:
        context:
          version: "2.0.0"
          action: "discover"
          timestamp: "2024-04-10T16:10:50+05:30"
          message_id: "4c5d6e7f-8091-42b3-94c5-d6e7f8091a2b"
          transactionId: "9c2d3e4f-5a6b-47c8-8d90-1a2b3c4d5e6f"
          bap_id: "bap.example.com"
          bap_uri: "https://bap.example.com"
          ttl: "PT30S"
          schemaContext:
            - "https://example.org/schema/items/v1/ElectronicItem/schema-context.jsonld"
            - "https://example.org/schema/items/v1/GroceryItem/schema-context.jsonld"
        message:
          textSearch: "premium tech and organic food"
          filters:
            expressionType: "jsonpath"
            expression: "$[?(@.rating.value >= 4 && (@.electronic.brand.name == 'Premium Tech' || @.grocery.organicCertification ~ 'USDA Organic'))]"
    # ---------- /on_discover callback (DiscoverResponse) examples ----------
    on_discover_electronics_catalog:
      summary: Electronics catalog callback
      value:
        context:
          version: "2.0.0"
          action: "on_discover"
          timestamp: "2024-04-10T16:10:50+05:30"
          message_id: "a1b2c3d4-e5f6-4789-90ab-cdef12345678"
          transactionId: "b2c3d4e5-f6a7-4890-8b9a-cdef23456789"
          bpp_id: "bpp.example.com"
          bpp_uri: "https://bpp.example.com"
          ttl: "PT30S"
        message:
          catalogs:
            - "@context": "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-rc2/schema/core/v2/context.jsonld"
              "@type": "beckn:Catalog"
