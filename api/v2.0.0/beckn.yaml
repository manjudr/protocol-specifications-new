    UpdateAction:
      $id: https://schema.beckn.io/UpdateAction/v2.0
      title: Update Action
      description: |
        Beckn /beckn/update message payload. Sent by a BAP to a BPP to request
        changes to an active contract (e.g., update fulfillment address, add items,
        change quantities). The context.try flag must be true during negotiation.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract


    UpdateConfirmMessage:
      description: |
        Update confirm message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#UpdateConfirmMessage
      type: object
      required:
        - order
      properties:
        order:
          $ref: 'https://schema.beckn.io/Order/v2.0'

    UpdateInitMessage:
      description: |
        Update init message from Ravi's version.
        Source: beckn-ravis-original-version.yaml#UpdateInitMessage
      type: object
      required:
