# beckn-proposed.yaml
#
# Merged, developer-friendly, backward-compatible Beckn Protocol v2.0 API Specification.
# Design decisions: see docs/core-schema-analysis.md
#
# Sources merged:
#   beckn-ravis-original-version.yaml  (Ravi Prakash)  — search fields, tracking, catalog publish
#   beckn-v2-abhisheks-version.yaml    (Abhishek)      — Contract model, oneOf backward compat
#   beckn.yaml / components/schema/core.yaml           — transport schemas (Ack, Signature, etc.)
#
# Style rules:
#   - Property names: camelCase (e.g. bapId, bapUri, transactionId, textSearch, callbackUrl)
#   - Schema names: PascalCase (e.g. Contract, Catalog, TrackingRequest)
#   - All data-model $refs point to #/components/schemas/{SchemaName}/v2.0
#   - Status fields use oneOf [string, object] — not bare string enums — to support
#     domain-specific status objects (e.g. beckn:OrderConfirmed, retail:Delivered, etc.)
#   - context.try is a first-class property of the Context schema (not overridden inline)

openapi: 3.1.1
info:
  title: Beckn Protocol API
  description: |
    The Beckn Protocol API Specification v2.0 — a concrete, developer-friendly OpenAPI 3.1.1
    specification with one named path per Beckn protocol action.

    ## Design Philosophy
    - **Minimalism**: Transport-layer schemas are inline. All data-model schemas
      (Catalog, Contract, Intent, etc.) are resolved from #/components/schemas.
    - **Pragmatism**: Every transaction endpoint carries both `order` (legacy, backward-compatible)
      and `contract` (new, generalized) in its message envelope via `oneOf`.
    - **Backward compatibility**: Implementations conformant with previous versions interoperate
      seamlessly with new implementations using the `contract` model.

    ## Typical Transaction Lifecycle
    ```
    discover → on_discover
    select → on_select → init → on_init → confirm → on_confirm
    → [status / on_status]* → [update / on_update]* → [cancel / on_cancel]?
    → [track / on_track]* → rate / on_rate → support / on_support
    ```

    ## (NEW) `context.try` — Sandbox Mode
    The `try` flag on the `Context` object (defined in `#/components/schemas/Context/v2.0`)
    indicates a sandbox mode being enabled on the network participant:
    - `context.try: true` — Request to test an endpoint without liabilities
      **before** committing. The receiver responds with expected consequences without changing state.
    - `context.try: false` (default) — Commit the action.
    This pattern is applicable to `update`, `cancel`, `rate`, and `support` actions.

    ## Authentication
    All requests MUST carry a valid Beckn HTTP Signature in the `Authorization` header.
    The `Ack` response body MUST carry a `CounterSignature` proving receipt.
    See `docs/10_Signing_Beckn_APIs_in_HTTP.md` for the signing specification.

    ## Compatibility Scope
    This specification is designed for interoperability across ALL value-exchange use cases:
    retail, mobility, logistics, energy, healthcare, skilling, financial services,
    carbon trading, hiring, data licensing, and any other domain built on Beckn.
  version: 2.0.0
  contact:
    name: Beckn Protocol
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en

tags:
  - name: Discovery
    description: Discover catalogs across a Beckn network
  - name: Transaction
    description: Select, negotiate, confirm and manage contracts/orders
  - name: Fulfillment
    description: Track, update and cancel active contracts/orders
  - name: Post-Fulfillment
    description: Rate and support completed contracts/orders
  - name: Catalog Publishing
    description: Publish catalogs to a Catalog Discovery Service (CDS)

paths:

  # ─────────────────────────────────────────────────────────────────────
  # DISCOVERY
  # ─────────────────────────────────────────────────────────────────────

  /beckn/discover:
    post:
      summary: Discover catalogs on a network
      description: |
        Search and discover catalogs on an open network. Supports text search (textSearch),
        JSONPath-based filtering (RFC 9535), spatial (geo) constraints, and media search.
        Returns an **ACK** confirming receipt; actual catalogs arrive via `/beckn/on_discover`.
        Can be implemented by Catalog Discovery Services (CDS) and BPPs.
      operationId: discover
      tags: [Discovery]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: discover
                message:
                  $ref: '#/components/schemas/DiscoverAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_discover:
    post:
      summary: Callback — return catalogs to the BAP
      description: |
        Callback from a BPP or CDS containing catalogs matching the discovery request.
        Returns an **ACK** confirming receipt of the catalog payload.
      operationId: onDiscover
      tags: [Discovery]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_discover
                message:
                  $ref: '#/components/schemas/OnDiscoverMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────────────────────────────
  # TRANSACTION — ORDERING
  # ─────────────────────────────────────────────────────────────────────

  /beckn/select:
    post:
      summary: BAP selects items/resources and requests a quote
      description: |
        The BAP selects catalog items, item quantities, associated offers, and requests
        the BPP to provide a priced quote. No PII is shared at this stage.
        Supports both the legacy `order` model (2.0-rc1) and the new `contract` model.
      operationId: select
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: select
                message:
                  $ref: '#/components/schemas/SelectAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_select:
    post:
      summary: BPP returns a priced quote
      description: |
        The BPP calculates the total cost, evaluates offers, and returns a priced quote.
        Supports both the legacy `order` model and the new `contract` model.
      operationId: onSelect
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_select
                message:
                  $ref: '#/components/schemas/OnSelectAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/init:
    post:
      summary: BAP initiates final order — submits billing, fulfillment and payment intent
      description: |
        BAP provides billing, fulfillment, and payment information for the BPP to generate
        final order terms. The BPP responds via `on_init` with the final draft including
        payment terms. Supports both `order` (legacy) and `contract` (new) models.
      operationId: init
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: init
                message:
                  $ref: '#/components/schemas/InitAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_init:
    post:
      summary: BPP returns final draft order/contract with payment terms
      description: |
        BPP returns the final draft order or contract with personalized payment terms.
        The BPP MUST NOT request payment before this stage.
      operationId: onInit
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_init
                message:
                  $ref: '#/components/schemas/OnInitAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/confirm:
    post:
      summary: BAP confirms the order/contract
      description: |
        BAP accepts all terms and provides payment proof/reference, then requests the BPP
        to confirm the order or contract into a binding commitment.
      operationId: confirm
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: confirm
                message:
                  $ref: '#/components/schemas/ConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_confirm:
    post:
      summary: BPP returns the confirmed order/contract
      description: |
        BPP validates all terms, payment, and returns a confirmed order or contract with
        its assigned ID and the initial fulfillment/performance state.
      operationId: onConfirm
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_confirm
                message:
                  $ref: '#/components/schemas/OnConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────────────────────────────
  # FULFILLMENT
  # ─────────────────────────────────────────────────────────────────────

  /beckn/status:
    post:
      summary: BAP requests the current state of an order/contract
      description: |
        BAP requests the latest state of an active order or contract by providing its ID.
        The BPP responds via `on_status`. BAPs SHOULD NOT long-poll with `status` —
        use `on_status` push notifications for significant state changes.
      operationId: status
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: status
                message:
                  $ref: '#/components/schemas/StatusAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_status:
    post:
      summary: BPP returns the current state of the order/contract
      description: |
        BPP returns the latest state of the order or contract including fulfillment/performance
        updates. The BPP MAY call this endpoint proactively without the BAP requesting it,
        but MUST have received at least one `status` request first to initiate the push stream.
        This endpoint is for significant state changes worth a notification — NOT for
        real-time location tracking (use `track`/`on_track` for that).
      operationId: onStatus
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_status
                message:
                  $ref: '#/components/schemas/OnStatusAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/track:
    post:
      summary: BAP requests a real-time tracking handle for an active order/contract
      description: |
        BAP requests a tracking handle (URL, WebSocket endpoint, or webhook) for real-time
        tracking of an active fulfillment or performance stage. This is for real-time
        position/progress updates — NOT for order state change notifications (use `status`).
      operationId: track
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: track
                message:
                  $ref: '#/components/schemas/TrackAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_track:
    post:
      summary: BPP returns real-time tracking handle and status
      operationId: onTrack
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_track
                message:
                  $ref: '#/components/schemas/OnTrackAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/update:
    post:
      summary: BAP requests a mutation to an active order/contract
      description: |
        BAP requests the BPP to update an active order or contract. Updates may involve
        change of items, quantities, billing, fulfillment/performance, or payment.

        Uses the `context.try` two-phase pattern (defined in `Context` schema):
        - `context.try: true` — BAP requests updated terms before committing (preview mode).
          BPP responds with recalculated quote and terms via `on_update` without changing state.
        - `context.try: false` (default) — BAP commits the update.
          BPP responds with the confirmed updated order/contract.
      operationId: update
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  oneOf:
                    - $ref: '#/components/schemas/UpdateInitAction'
                    - $ref: '#/components/schemas/UpdateConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_update:
    post:
      summary: BPP returns the updated order/contract
      description: |
        BPP returns the updated order or contract with recalculated terms. Can be called
        proactively by the BPP without the BAP requesting it.
        - If `context.try: true` — returns updated terms (preview; state not changed).
        - If `context.try: false` — returns committed updated order/contract.
      operationId: onUpdate
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  oneOf:
                    - $ref: '#/components/schemas/OnUpdateInitAction'
                    - $ref: '#/components/schemas/OnUpdateConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/cancel:
    post:
      summary: BAP requests cancellation of an order/contract
      description: |
        BAP requests full or partial cancellation. Uses the `context.try` two-phase pattern:
        - `context.try: true` — BAP requests cancellation terms (e.g., refund policy, penalty)
          without committing to cancellation. BPP responds with applicable policy via `on_cancel`.
        - `context.try: false` (default) — BAP commits the cancellation.
          BPP confirms cancellation and returns cancelled order/contract.
      operationId: cancel
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  oneOf:
                    - $ref: '#/components/schemas/CancelInitAction'
                    - $ref: '#/components/schemas/CancelConfirmction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_cancel:
    post:
      summary: BPP returns cancellation terms or confirms cancellation
      description: |
        - If `context.try: true` — returns applicable cancellation policy, fees, refund timeline
          (state not changed).
        - If `context.try: false` — returns confirmed cancelled order/contract with refund/payment update.
      operationId: onCancel
      tags: [Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  oneOf:
                    - $ref: '#/components/schemas/OnCancelInitAction'
                    - $ref: '#/components/schemas/OnCancelConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────────────────────────────
  # POST-FULFILLMENT
  # ─────────────────────────────────────────────────────────────────────

  /beckn/rate:
    post:
      summary: BAP submits ratings for one or more entities
      description: |
        BAP submits ratings for any ratable entity (order, contract, fulfillment,
        item, provider, agent, support interaction). Supports the `context.try` pattern:
        - `context.try: true` — Preview: BPP returns the rating form/criteria without recording.
        - `context.try: false` (default) — Submit: BPP records the rating and returns confirmation.
        The BPP acknowledges via `on_rate` with an optional aggregate snapshot.
      operationId: rate
      tags: [Post-Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  $ref: '#/components/schemas/RateAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_rate:
    post:
      summary: BPP acknowledges rating and optionally returns aggregate
      description: |
        - If `context.try: true` — returns rating form/criteria (preview mode).
        - If `context.try: false` — confirms rating was recorded; optionally returns aggregate.
      operationId: onRate
      tags: [Post-Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  $ref: '#/components/schemas/OnRateAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/support:
    post:
      summary: BAP requests support information for an entity
      description: |
        BAP requests support channels and/or raises a support ticket for any entity.
        Uses the `context.try` pattern:
        - `context.try: true` — Preview: BPP returns available support channels without creating a ticket.
        - `context.try: false` (default) — BAP submits a support request; BPP creates/links a ticket.
        The `refType` field abstracts over domain-specific entity types (works for contracts,
        resources, providers, agents — not just orders).
      operationId: support
      tags: [Post-Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  $ref: '#/components/schemas/SupportAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/on_support:
    post:
      summary: BPP returns support details
      description: |
        - If `context.try: true` — returns available support channels (preview mode).
        - If `context.try: false` — returns support details with ticket(s).
      operationId: onSupport
      tags: [Post-Fulfillment]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  $ref: '#/components/schemas/Context/v2.0'
                message:
                  $ref: '#/components/schemas/OnSupportAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────────────────────────────
  # CATALOG PUBLISHING SERVICE
  # ─────────────────────────────────────────────────────────────────────

  /beckn/catalog/publish:
    post:
      summary: BPP publishes catalogs for indexing by a CDS
      description: |
        BPP submits one or more catalogs to be indexed by a Catalog Discovery Service (CDS).
        Returns an **ACK** immediately if accepted for processing. The per-catalog processing
        result arrives asynchronously via `/beckn/catalog/on_publish`.
      operationId: catalogPublish
      tags: [Catalog Publishing]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: catalog/publish
                message:
                  $ref: '#/components/schemas/CatalogPublishAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /beckn/catalog/on_publish:
    post:
      summary: CDS returns per-catalog processing results to the BPP
      operationId: catalogOnPublish
      tags: [Catalog Publishing]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context/v2.0'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: catalog/on_publish
                message:
                  $ref: '#/components/schemas/CatalogOnPublishAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

# ─────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────
components:

  # ─── Parameters ──────────────────────────────────────────────────
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      description: |
        Beckn HTTP Signature authentication header.
        See `#/components/schemas/Signature` for the expected format.
      schema:
        $ref: '#/components/schemas/Signature'

  # ─── Message Schemas ──────────────────────────────────────────────

  schemas:

    # ── Discovery Messages ──────────────────────────────────────────

    DiscoverAction:
      description: |
        The discover request payload. Contains an `Intent` object for structured 
        or unstructured discovery.
      type: object
      properties:
        intent:
          description: Structured intent object for discovery
      required:
        - intent

    OnDiscoverAction:
      description: The on_discover response payload containing matching catalogs.
      type: object
      required: [catalogs]
      properties:
        catalogs:
          type: array
          description: |
            Array of catalogs matching the discovery request.
            Note: Each catalog's `items` array carries `oneOf [Item, Resource]` entries:
            - `Item` — legacy 2.0-rc1 catalog item (backward compatible)
            - `Resource` — new cross-domain resource abstraction (generalized)
            Both types share the common `id` + `descriptor` surface for display rendering.
            See `#/components/schemas/Catalog/v2.0` for the full Catalog schema.
          items:
            $ref: '#/components/schemas/Catalog/v2.0'

    # ── External xAction Envelope Schemas (from schema.beckn.io) ───
    # These are the full-envelope schemas as published at schema.beckn.io.
    # The context + message wrapper has been stripped; only the message
    # payload content is inlined here (since context is already declared
    # inline on each endpoint's requestBody). The $id points to the
    # canonical URI at schema.beckn.io.

    DiscoverActionExternal:
      $id: https://schema.beckn.io/DiscoverAction/v2.0
      title: Discover Action (External)
      description: |
        Beckn /beckn/discover message payload as published at schema.beckn.io.
        Contains the Intent object for structured or unstructured discovery.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        intent:
          allOf:
            - $ref: '#/components/schemas/Intent'
      required:
        - intent

    OnDiscoverActionExternal:
      $id: https://schema.beckn.io/OnDiscoverAction/v2.0
      title: On Discover Action (External)
      description: |
        Beckn /beckn/on_discover message payload as published at schema.beckn.io.
        Contains the array of matching Catalog objects.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        catalogs:
          type: array
          items:
            $ref: '#/components/schemas/Catalog'
      required:
        - catalogs

    # ── xAction Message Schemas (from schema.beckn.io, message-content only) ──

    SelectAction:
      $id: https://schema.beckn.io/SelectAction/v2.0
      title: Select Action
      description: |
        Beckn /beckn/select message payload. Sent by a BAP to a BPP to select
        items and offers from a catalog, initiating the negotiation cycle.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnSelectAction:
      $id: https://schema.beckn.io/OnSelectAction/v2.0
      title: On Select Action
      description: |
        Beckn /beckn/on_select message payload. Sent by a BPP to a BAP in
        response to a /beckn/select call, with updated contract terms.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    InitAction:
      $id: https://schema.beckn.io/InitAction/v2.0
      title: Init Action
      description: |
        Beckn /beckn/init message payload. Sent by a BAP to a BPP to initialise
        a contract with consumer details (billing address, fulfillment preferences, etc.).
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnInitAction:
      $id: https://schema.beckn.io/OnInitAction/v2.0
      title: On Init Action
      description: |
        Beckn /beckn/on_init message payload. Sent by a BPP to a BAP in response
        to a /beckn/init call, with the updated contract including payment terms
        and billing confirmation.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    ConfirmAction:
      $id: https://schema.beckn.io/ConfirmAction/v2.0
      title: Confirm Action
      description: |
        Beckn /beckn/confirm message payload. Sent by a BAP to a BPP to confirm
        a contract, finalising the transaction terms agreed during the
        select–init negotiation cycle.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnConfirmAction:
      $id: https://schema.beckn.io/OnConfirmAction/v2.0
      title: On Confirm Action
      description: |
        Beckn /beckn/on_confirm message payload. Sent by a BPP to a BAP in
        response to a /beckn/confirm call, returning the confirmed contract
        with status set to CONFIRMED.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    StatusAction:
      $id: https://schema.beckn.io/StatusAction/v2.0
      title: Status Action
      description: |
        Beckn /beckn/status message payload. Sent by a BAP to a BPP to query
        the current state of a contract/order by its identifier.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        order:
          type: object
          description: Minimal contract/order reference for the status query.
          properties:
            id:
              description: Identifier of the contract/order whose status is being queried.
              allOf:
                - $ref: 'https://schema.beckn.io/Contract/v2.0#/properties/id'
          required:
            - id
      required:
        - order

    OnStatusAction:
      $id: https://schema.beckn.io/OnStatusAction/v2.0
      title: On Status Action
      description: |
        Beckn /beckn/on_status message payload. Sent by a BPP to a BAP in
        response to a /beckn/status call (or as an unsolicited status push),
        returning the current state of the contract.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    TrackAction:
      $id: https://schema.beckn.io/TrackAction/v2.0
      title: Track Action
      description: |
        Beckn /beckn/track message payload. Sent by a BAP to a BPP to request
        a real-time tracking handle for a fulfillment within an active contract.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        tracking:
          allOf:
            - $ref: '#/components/schemas/TrackingRequest'
      required:
        - tracking

    OnTrackAction:
      $id: https://schema.beckn.io/OnTrackAction/v2.0
      title: On Track Action
      description: |
        Beckn /beckn/on_track message payload. Sent by a BPP to a BAP in
        response to a /beckn/track call, returning a Tracking handle with
        the URL and/or WebSocket endpoint for real-time fulfillment tracking.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        tracking:
          allOf:
            - $ref: '#/components/schemas/Tracking'
      required:
        - tracking

    UpdateAction:
      $id: https://schema.beckn.io/UpdateAction/v2.0
      title: Update Action
      description: |
        Beckn /beckn/update message payload. Sent by a BAP to a BPP to request
        changes to an active contract (e.g., update fulfillment address, add items,
        change quantities). The context.try flag must be true during negotiation.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnUpdateAction:
      $id: https://schema.beckn.io/OnUpdateAction/v2.0
      title: On Update Action
      description: |
        Beckn /beckn/on_update message payload. Sent by a BPP to a BAP in
        response to a /beckn/update call (or as an unsolicited update push),
        returning the updated contract state.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    CancelAction:
      $id: https://schema.beckn.io/CancelAction/v2.0
      title: Cancel Action
      description: |
        Beckn /beckn/cancel message payload. Sent by a BAP to a BPP to request
        cancellation of an active contract. Set context.try to true to first
        retrieve cancellation terms and fees before committing.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    OnCancelAction:
      $id: https://schema.beckn.io/OnCancelAction/v2.0
      title: On Cancel Action
      description: |
        Beckn /beckn/on_cancel message payload. Sent by a BPP to a BAP in
        response to a /beckn/cancel call, returning the contract with status
        set to CANCELLED and any applicable cancellation outcome.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        contract:
          allOf:
            - $ref: '#/components/schemas/Contract'
      required:
        - contract

    RateAction:
      $id: https://schema.beckn.io/RateAction/v2.0
      title: Rate Action
      description: |
        Beckn /beckn/rate message payload. Sent by a BAP to a BPP to submit
        one or more rating inputs for entities in a completed contract
        (order, fulfillment, item, provider, agent, support).
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        ratingInputs:
          type: array
          items:
            $ref: '#/components/schemas/RatingInput'
      required:
        - ratingInputs

    OnRateAction:
      $id: https://schema.beckn.io/OnRateAction/v2.0
      title: On Rate Action
      description: |
        Beckn /beckn/on_rate message payload. Sent by a BPP to a BAP in
        response to a /beckn/rate call, optionally returning rating forms
        to collect structured feedback from the consumer.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        ratingForms:
          type: array
          items:
            $ref: '#/components/schemas/RatingForm'
      required:
        - ratingForms

    SupportAction:
      $id: https://schema.beckn.io/SupportAction/v2.0
      title: Support Action
      description: |
        Beckn /beckn/support message payload. Sent by a BAP to a BPP to request
        support contact information or to open a support ticket for an existing
        order/contract.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        supportRequest:
          allOf:
            - $ref: '#/components/schemas/SupportRequest'
      required:
        - supportRequest

    OnSupportAction:
      $id: https://schema.beckn.io/OnSupportAction/v2.0
      title: On Support Action
      description: |
        Beckn /beckn/on_support message payload. Sent by a BPP to a BAP in
        response to a /beckn/support call, returning support contact details
        and available channels.
        (Context wrapper stripped; only the message-content portion is inlined.)
      type: object
      additionalProperties: true
      properties:
        supportInfo:
          allOf:
            - $ref: '#/components/schemas/SupportInfo'
      required:
        - supportInfo

    # ── Transaction Messages (backward-compatible) ──────────────────

    TransactionMessage:
      $id: #/components/schemas/TransactionMessage/v2.0
      description: |
        Backward-compatible transaction message envelope.

        - New implementations: send `contract` (generalized, domain-neutral, cross-industry).
        - Legacy implementations (2.0-rc1): send `order` (commerce-specific).
        - Migration period: either or both MAY be present simultaneously.

        Validators MUST accept any message carrying at least one of `order` or `contract`.
      type: object
      properties:
        order:
          description: Legacy order object (2.0-rc1 backward compatibility)
          $ref: '#/components/schemas/Contract/v2.0'
        contract:
          description: Generalized contract object (v2.0 new model)
          $ref: '#/components/schemas/Contract/v2.0'
      oneOf:
        - required: [order]
        - required: [contract]

    # ── Status Message ──────────────────────────────────────────────

    StatusMessage:
      $id: #/components/schemas/StatusMessage/v2.0
      description: |
        Minimal status request — provide the `order.id` or `contract.id`.
        Only the ID field is required; additional fields MUST NOT be sent in a status request.
      type: object
      properties:
        order:
          type: object
          additionalProperties: false
          required: [id]
          properties:
            id:
              type: string
              description: ID of the order to query
        contract:
          type: object
          additionalProperties: false
          required: [id]
          properties:
            id:
              type: string
              description: ID of the contract to query
      oneOf:
        - required: [order]
        - required: [contract]

    # ── Track Messages ──────────────────────────────────────────────

    TrackMessage:
      $id: #/components/schemas/TrackMessage/v2.0
      description: |
        Real-time tracking request. The `tracking.id` is the tracking identifier
        (typically the order/contract ID or a specific fulfillment stage ID).
        Optionally specify a `callbackUrl` for push-based tracking updates
        and a `modeHint` for the preferred delivery mechanism.
      type: object
      required: [tracking]
      properties:
        tracking:
          $ref: '#/components/schemas/TrackingRequest/v2.0'

    OnTrackMessage:
      $id: #/components/schemas/OnTrackMessage/v2.0
      description: Real-time tracking response with URL or tracking handle.
      type: object
      required: [tracking]
      properties:
        tracking:
          $ref: '#/components/schemas/Tracking/v2.0'

    # ── Cancel Message ──────────────────────────────────────────────

    CancelMessage:
      $id: #/components/schemas/CancelMessage/v2.0
      description: |
        Cancellation request payload. Provide the `order.id` or `contract.id` and
        optionally a `cancellationReason`. When `context.try: true`, only the ID is
        required (reason optional). When `context.try: false`, supporting documentation
        (if required by the BPP's cancellation policy) SHOULD be included.
      type: object
      properties:
        order:
          type: object
          required: [id]
          properties:
            id:
              type: string
              description: ID of the order to cancel
            cancellationReason:
              $ref: '#/components/schemas/CancellationReason/v2.0'
        contract:
          type: object
          required: [id]
          properties:
            id:
              type: string
              description: ID of the contract to cancel
            cancellationReason:
              $ref: '#/components/schemas/CancellationReason/v2.0'
      oneOf:
        - required: [order]
        - required: [contract]

    # ── Rate Messages ───────────────────────────────────────────────

    RateMessage:
      $id: #/components/schemas/RateMessage/v2.0
      description: |
        Rating submission payload.
        - `context.try: true` — BAP requests the rating form/criteria (preview).
        - `context.try: false` — BAP submits actual ratings.
      type: object
      required: [ratings]
      properties:
        ratings:
          type: array
          minItems: 1
          description: One or more rating inputs for different aspects of the transaction
          items:
            $ref: '#/components/schemas/RatingInput/v2.0'

    OnRateMessage:
      $id: #/components/schemas/OnRateMessage/v2.0
      description: |
        Rating acknowledgement with optional aggregate snapshot.
        - `context.try: true` — returns the rating form/criteria.
        - `context.try: false` — confirms rating was received and recorded.
      type: object
      properties:
        received:
          type: boolean
          default: true
          description: Confirms the rating was received and processed.
        aggregate:
          type: object
          description: Optional aggregated rating snapshot for display
          properties:
            count:
              type: integer
              minimum: 0
            value:
              type: number
              minimum: 0
            bestRating:
              type: number
              minimum: 0
            worstRating:
              type: number
              minimum: 0
        feedbackForm:
          $ref: '#/components/schemas/Form/v2.0'
        ratingForm:
          $ref: '#/components/schemas/RatingForm/v2.0'

    # ── Support Messages ────────────────────────────────────────────

    SupportMessage:
      $id: #/components/schemas/SupportMessage/v2.0
      description: |
        Support request payload. Identifies the entity for which support is needed
        using a domain-agnostic `refType` enum. Applicable to ALL value-exchange use cases:
        retail, mobility, healthcare, skilling, financial services, energy, carbon trading, etc.
        - `context.try: true` — Preview: returns available support channels without creating a ticket.
        - `context.try: false` — Submit: creates/links a support ticket.
      type: object
      required: [refId, refType]
      properties:
        refId:
          type: string
          description: ID of the entity for which support is requested
        refType:
          type: string
          description: Type of the entity being referenced (domain-agnostic)
          enum:
            - CONTRACT
            - ORDER
            - FULFILLMENT
            - PERFORMANCE
            - RESOURCE
            - ITEM
            - OFFER
            - PROVIDER
            - AGENT
            - OTHER
        supportRequest:
          $ref: '#/components/schemas/SupportRequest/v2.0'

    OnSupportMessage:
      $id: #/components/schemas/OnSupportMessage/v2.0
      description: Support response with available channels and/or ticket details.
      type: object
      required: [support]
      properties:
        support:
          $ref: '#/components/schemas/Support/v2.0'

    # ── Catalog Publishing Messages ─────────────────────────────────

    CatalogPublishMessage:
      $id: #/components/schemas/CatalogPublishMessage/v2.0
      description: Catalog publish request payload.
      type: object
      required: [catalogs]
      properties:
        catalogs:
          type: array
          minItems: 1
          description: One or more catalogs to be indexed by the CDS
          items:
            $ref: '#/components/schemas/Catalog/v2.0'

    CatalogOnPublishMessage:
      $id: #/components/schemas/CatalogOnPublishMessage/v2.0
      description: Catalog publish processing results from CDS to BPP.
      type: object
      required: [results]
      properties:
        results:
          type: array
          description: Per-catalog processing results
          items:
            $ref: '#/components/schemas/CatalogProcessingResult'

    CatalogProcessingResult:
      $id: #/components/schemas/CatalogProcessingResult/v2.0
      description: Processing result for a single catalog submission.
      type: object
      required: [catalogId, status]
      properties:
        catalogId:
          type: string
          description: Identifier of the submitted catalog
        status:
          description: |
            Processing outcome. Using oneOf [string, object] to allow domain-specific
            status objects (e.g. beckn:CatalogAccepted) alongside standard string codes.
          oneOf:
            - type: string
              enum: [ACCEPTED, REJECTED, PARTIAL]
              description: |
                Standard processing status:
                - ACCEPTED — catalog indexed successfully
                - REJECTED — catalog rejected entirely (see errors)
                - PARTIAL — some items accepted, some rejected (see errors)
            - type: object
              properties:
                '@context':
                  type: string
                  format: uri
                  const: '#/components/schemas/'
                '@type':
                  type: string
                  pattern: '^beckn:[A-Za-z0-9._~-]+$'
              additionalProperties: true
        errors:
          type: array
          description: Per-item or per-catalog errors (present when REJECTED or PARTIAL)
          items:
            $ref: '#/components/schemas/Error'
        stats:
          type: object
          description: Optional statistics about the processed catalog
          properties:
            itemCount:
              type: integer
              description: Number of items accepted
            providerCount:
              type: integer
              description: Number of providers in the catalog
            categoryCount:
              type: integer
              description: Number of distinct categories

    # ── Transport Layer Schemas ─────────────────────────────────────
    # These are protocol-transport concerns — NOT in schemas/schema.

    Ack:
      $id: #/components/schemas/Ack/v2.0
      title: Acknowledgement
      description: Synchronous receipt acknowledgement returned for every accepted Beckn request.
      type: object
      required: [status, signature]
      properties:
        status:
          type: string
          enum: [ACK, NACK]
          description: ACK if the request was accepted; NACK if rejected.
        error:
          $ref: '#/components/schemas/Error'
          description: Present only when status is NACK.
        signature:
          allOf:
            - $ref: '#/components/schemas/CounterSignature'
          description: |
            Counter-signature proving the receiver authenticated and processed the inbound request.

    AckNoCallback:
      $id: #/components/schemas/AckNoCallback/v2.0
      title: Acknowledgement — No Callback
      description: |
        Request received and valid, but no asynchronous callback will follow.
        Typical causes: no matching agents found, inventory unavailable, store/provider closed.
      allOf:
        - $ref: '#/components/schemas/Ack'
        - properties:
            error:
              allOf:
                - $ref: '#/components/schemas/Error'
              description: Optional error detail explaining why no callback will follow.

    AsyncError:
      title: Asynchronous Error
      description: |
        Error returned asynchronously during a callback. Wraps the base `Error` schema with
        JSON-LD type annotations to allow linked-data processing.
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            '@context':
              type: string
              default: '#/components/schemas/'
            '@type':
              type: string
              default: AsyncError
          additionalProperties: true

    CounterSignature:
      title: Beckn HTTP Counter-Signature
      description: |
        A signed receipt transmitted in the synchronous `Ack` response body, proving that the
        receiver authenticated, received, and processed the inbound request.

        `CounterSignature` shares the same wire format as `Signature` but differs:
        - **Signer**: the response receiver (not the request sender)
        - **Location**: transmitted in the `Ack` response body (not in the `Authorization` header)
        - **`digest`**: covers the Ack response body (not the inbound request body)
        - **`(request-digest)`** and **`(message-id)`** MUST be included in the signing string

        Signing string format:
        ```
        (created): {unixTimestamp}
        (expires): {unixTimestamp}
        digest: BLAKE-512={base64DigestOfAckBody}
        (request-digest): BLAKE-512={base64DigestOfInboundRequestBody}
        (message-id): {messageId}
        ```
      allOf:
        - $ref: '#/components/schemas/Signature'

    Error:
      $id: #/components/schemas/Error/v2.0
      title: Error
      description: |
        Base error container returned in NACK responses and async error callbacks.
        Domain-specific error codes SHOULD follow the Beckn error code registry
        (see docs/11_Error_Codes.md). Custom error objects may be expressed as
        `oneOf [string, object]` payloads via the `errorDetails` field.
      type: object
      properties:
        errorCode:
          type: string
          description: Machine-readable error code per the Beckn error registry.
        errorMessage:
          type: string
          description: Human-readable error description for display or logging.
        errorDetails:
          description: |
            Optional domain-specific error details. Using oneOf to allow both simple
            string details and structured JSON-LD error objects from domain packs.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true

    InReplyTo:
      $id: #/components/schemas/InReplyTo/v2.0
      title: In-Reply-To Reference
      description: |
        A cryptographic binding that ties an asynchronous `on_<action>` callback to the
        specific inbound request that triggered it. Establishes bilateral non-repudiation
        for the asynchronous leg of a Beckn interaction.

        Use `lineage` (on `Context`) for cross-transaction causality.

        Verification steps:
        1. Recompute BLAKE2b-512 digest of the original request body; compare to `digest`.
        2. Confirm `messageId` matches the `messageId` from the original request `Context`.
      type: object
      required: [messageId, digest]
      properties:
        messageId:
          type: string
          format: uuid
          description: The `messageId` of the parent request from its `Context`.
        digest:
          type: string
          pattern: '^BLAKE-512=[A-Za-z0-9+/]+=*$'
          description: |
            BLAKE2b-512 hash of the parent request body, Base64-encoded with algorithm prefix.
            Format: `BLAKE-512={base64EncodedHash}`

    NackBadRequest:
      title: NACK — Bad Request
      description: Malformed or invalid request; the server could not parse or validate the payload.
      allOf:
        - $ref: '#/components/schemas/Ack'
        - type: object
          properties:
            status:
              type: string
              const: NACK
            error:
              $ref: '#/components/schemas/Error'

    NackUnauthorized:
      title: NACK — Unauthorized
      description: Invalid or missing authentication credentials; signature could not be verified.
      allOf:
        - $ref: '#/components/schemas/Ack'
        - type: object
          properties:
            status:
              type: string
              const: NACK
            error:
              $ref: '#/components/schemas/Error'

    ServerError:
      $id: #/components/schemas/ServerError/v2.0
      title: Server Error
      description: |
        Internal failure on the network participant's platform; the request could not be processed.
        The response body MAY contain an `error` object with additional details.
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'

    Signature:
      title: Beckn HTTP Signature
      description: |
        A digitally signed authentication credential in the HTTP `Authorization` header.
        Follows draft-cavage-http-signatures-12 as profiled by BECKN-006.

        Format:
        ```
        Signature keyId="{subscriberId}|{uniqueKeyId}|{algorithm}",
          algorithm="{algorithm}",created="{unixTimestamp}",expires="{unixTimestamp}",
          headers="{signedHeaders}",signature="{base64Signature}"
        ```

        | Attribute | Description |
        |-----------|-------------|
        | `keyId` | `{subscriberId}|{uniqueKeyId}|{algorithm}` — FQDN, registry UUID, algorithm |
        | `algorithm` | MUST be `ed25519` |
        | `created` | Unix timestamp when the signature was created |
        | `expires` | Unix timestamp when the signature expires |
        | `headers` | Space-separated signed headers. MUST include `(created)`, `(expires)`, `digest` |
        | `signature` | Base64-encoded Ed25519 signature over the signing string |

        Signing string:
        `(created): {value}\n(expires): {value}\ndigest: BLAKE-512={digest}`
        where `digest` is a BLAKE2b-512 hash of the request body, Base64-encoded.
      type: string
      pattern: '^Signature keyId="[^|"]+\|[^|"]+\|[^"]+",algorithm="[^"]+",created="\d+",expires="\d+",headers="[^"]+",signature="[A-Za-z0-9+/]+=*"$'


    Catalog:
      $id: https://schema.beckn.io/Catalog/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: Catalog schema for Beckn Protocol v2.0.1
      title: Catalog
      x-tags: [common]
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the core Catalog schema
          type: string
          format: uri
          const: "https://schema.beckn.io/"
        '@type':
          description: Type of the catalog
          type: string
          const: beckn:Catalog
        bppId:
          description: BPP (Beckn Protocol Provider) identifier that publishes this catalog
          type: string
          example: bpp.example.com
        bppUri:
          description: BPP (Beckn Protocol Provider) URI endpoint
          type: string
          format: uri
          example: "https://bpp.example.com"
        descriptor:
          description: A verbal summary of the catalog for humans, AI agents, etc to read and understand the context.
          allOf:
          - $ref: "https://schema.beckn.io/Descriptor/v2.0"
        id:
          description: Unique identifier for the catalog
          type: string
          example: catalog-electronics-001
        isActive:
          description: Whether the catalog is active
          type: boolean
          default: true
        items:
          description: Array of beckn core Item entities in this catalog
          type: array
          items:
            $ref: "https://schema.beckn.io/Item/v2.0"
        offers:
          type: array
          items:
            $ref: "https://schema.beckn.io/Offer/v2.0"
        providerId:
          description: Reference to the provider that owns this catalog
          type: string
          example: tech-store-001
        validity:
          description: The time period during which this catalog is valid
          allOf:
          - $ref: "https://schema.beckn.io/TimePeriod/v2.0"
      required:
      - '@context'
      - '@type'
      - id
      - descriptor
      - bppId
      - bppUri
      - items
      additionalProperties: false

    Contract:
      $id: https://schema.beckn.io/Contract/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: This is a JSON-LD compliant, linked-data schema that specifies a generic multi-party, digitally
        signed Contract between a set of participants. based on the vocabulary defined in the @context. By default,
        it is the most generic form of contract i.e beckn:Contract. However, based on the mapping being used
        in @context, it could take values like retail:Order, mobility:Reservation, healthcare:Appointment, and
        so on, which will be defined as sub-classes of beckn:Contract.
      title: Contract
      type: object
      properties:
        '@context':
          description: A URL to the reference vocabulary where this schema has been defined. If missing, this
            field defaults to `https://schema.beckn.io/`. It allows applications to fetch the mapping between
            the simple JSON keys of this class and absolute Beckn IRIs (Internationalized Resource Identifiers),
            allowing conversion of standard Beckn JSON payload into linked data.
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          description: A Beckn IRI on the vocabulary defined in the @context. Must start with "beckn:" followed
            by URL-safe identifier characters.
          type: string
          pattern: ^beckn:[A-Za-z0-9._~-]+$
          default: beckn:Contract
        id:
          description: A UUID string generated at the BPP endpoint at any stage before the confirmation of the
            order i.e before `/on_confirm` callback. This value is intended typically for indexing or filtering.
            While the chances of a UUID collision are rare, it is recommended to use a combination of `bppId`,
            `providerId` and `id` to allow for global uniqueness.
          type: string
          format: uuid
        displayId:
          description: A human-readable / Agent-readable identifier of the contract intended for display or
            printing. This value may or may not be different from `id` which is intended purely for machine-readability.
            Typically, this value is generated after the confirmation of the order at the BPP's end.
          type: string
        items:
          description: The items of value i.e resources, specified in this contract. Depending upon the context,
            these resources could be a combination physical objects, virtual objects, services, time slots,
            distance travelled, alloted space, and many more.
          type: array
          items:
            $ref: https://schema.beckn.io/ContractItem/v2.0
          minItems: 1
        status:
          description: The current state of the contract. Depending on the context, it could be just a code
            or a detailed description of state.
          oneOf:
          - type: string
            description: A single code describing the status of the contract.
          - type: object
            properties:
              '@context':
                type: string
                format: uri
                const: https://schema.beckn.io/
              '@type':
                type: string
                pattern: ^beckn:[A-Za-z0-9._~-]+$
            additionalProperties: true
        contractValue:
          description: An object that captures the total value of the contract including a breakup of the items,
            discounts, fulfillment charges, and any other additional charges relevant to that context.
          oneOf:
          - $ref: https://schema.beckn.io/PriceSpecification/v2.0
          - type: object
            properties:
              '@context':
                type: string
                format: uri
                const: https://schema.beckn.io/
              '@type':
                type: string
                pattern: ^beckn:[A-Za-z0-9._~-]+$
            additionalProperties: true
        participants:
          description: The participants involved in the contract. Contracts are not always between two individuals.
            Several entities may play a specific role in the creation, fulfillment, and post-fulfillment of
            the contract.
          type: array
          items:
            $ref: https://schema.beckn.io/Participant/v2.0
        entitlements:
          type: array
          items:
            $ref: https://schema.beckn.io/Entitlement/v2.0
        fulfillments:
          description: Describes the acts performed by each participant to fulfill the contract
          type: array
          items:
            $ref: https://schema.beckn.io/Fulfillment/v2.0
      required:
      - '@type'
      - participants
      - items
      additionalProperties: false
      x-tags:
      - common

    Intent:
      $id: https://schema.beckn.io/Intent/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: A declaration of an intent to discover catalogs.
      title: Intent
      x-tags: [common]
      type: object
      properties:
        textSearch:
          description: Free text search query for items
          type: string
          example: gaming laptop premium tech
        filters:
          description: Filter criteria for items
          type: object
          properties:
            type:
              description: Type of filter expression
              type: string
              enum:
              - jsonpath
              default: jsonpath
            expression:
              description: Filter expression based on the specified type
              type: string
              example: $[?(@.rating.value >= 4.0 && @.electronic.brand.name == 'Premium Tech')]
          required:
          - type
          - expression
        spatial:
          description: Optional array of spatial constraints (CQL2-JSON semantics).
          type: array
          items:
            $ref: "https://schema.beckn.io/SpatialConstraint/v2.0"
        media_search:
          $ref: "https://schema.beckn.io/MediaSearch/v2.0"
      anyOf:
      - required:
        - textSearch
      - required:
        - filters
      - required:
        - spatial
      - required:
        - filters
        - spatial
      additionalProperties: false

    RatingForm:
      $id: https://schema.beckn.io/RatingForm/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: A form designed to capture rating and feedback from a user. This can be used by both BAP and BPP to fetch ratings
        and feedback of their respective users.
      title: RatingForm
      x-tags: [common]
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: "https://schema.beckn.io/"
        '@type':
          type: string
          default: RatingForm
          x-jsonld:
            '@id': beckn:RatingForm
          target:
            description: The entity being rated
            type: object
            properties:
              '@context':
                type: string
                format: uri
                const: "https://schema.beckn.io/"
              '@type':
                type: string
                default: RatingTarget
                x-jsonld:
                  '@id': beckn:RatingTarget
              id:
                description: IF of the entity being rated (order/item/fulfillment/provider/agent).
                type: string
              ratingTargetType:
                description: What is being rated. This can be any entity in the order lifecycle that influenced the overall experience
                  of the user
                type: string
                enum:
                - Order
                - Fulfillment
                - FulfillmentStage
                - Provider
                - Agent
          range:
            oneOf:
            - type: object
              properties:
                bestRating:
                  description: Maximum of the rating scale (default 5 if omitted).
                  type: number
                worstRating:
                  description: Minimum of the rating scale (default 1 or 0 if omitted).
                  type: number
            - type: array
              description: A custom rating range indexed from 0 to n
              properties:
                index:
                  type: integer
                  minimum: 0
                value:
                  $ref: "https://schema.beckn.io/Descriptor/v2.0"
          feedbackForm:
            description: A feedback form sent along with a rating request
            allOf:
            - $ref: "https://schema.beckn.io/Form/v2.0"
          feedbackRequired:
            type: boolean
            description: Specifies whether feedback after rating is required for acceptance of rating
        required:
        - '@context'
        - '@type'
        - target
        - feedbackRequired
      additionalProperties: false

    RatingInput:
      $id: https://schema.beckn.io/RatingInput/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: A form designed to capture rating and feedback from a user. This can be used by both BAP and BPP to fetch ratings
        and feedback of their respective users.
      title: RatingInput
      x-tags: [common]
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: "https://schema.beckn.io/"
        '@type':
          type: string
          default: RatingForm
          x-jsonld:
            '@id': beckn:RatingForm
        target:
          description: The entity being rated
          type: object
          properties:
            '@context':
              type: string
              format: uri
              const: "https://schema.beckn.io/"
            '@type':
              type: string
              default: RatingTarget
              x-jsonld:
                '@id': beckn:RatingTarget
            id:
              description: IF of the entity being rated (order/item/fulfillment/provider/agent).
              type: string
            category:
              description: What is being rated. This can be any entity in the order lifecycle that influenced the overall experience
                of the user
              type: string
              enum:
              - Order
              - Fulfillment
              - FulfillmentStage
              - Provider
              - Agent
          required:
          - '@context'
          - '@type'
          - id
          - category
        range:
          oneOf:
          - type: object
            properties:
              bestRating:
                description: Maximum of the rating scale (default 5 if omitted).
                type: number
              worstRating:
                description: Minimum of the rating scale (default 1 or 0 if omitted).
                type: number
          - type: array
            description: A custom rating range indexed from 0 to n
            properties:
              index:
                type: integer
                minimum: 0
              value:
                $ref: "https://schema.beckn.io/Descriptor/v2.0"
        feedbackFormSubmission:
          description: The submission to the feedback form sent along with a rating request
          allOf:
          - $ref: "https://schema.beckn.io/FormSubmission/v2.0"
      required:
      - '@context'
      - '@type'
      - target
      - range
      additionalProperties: false

    SupportInfo:
      $id: https://schema.beckn.io/SupportInfo/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: Canonical support contact for an entity, mapped to schema.org ContactPoint.
      title: SupportInfo
      x-tags: [common]
      type: object
      properties:
        '@context':
          type: string
          format: uri
          default: "https://schema.beckn.io/"
        '@type':
          type: string
          default: beckn:SupportInfo
        channels:
          description: Available support channels.
          type: array
          items:
            type: string
            enum:
            - PHONE
            - EMAIL
            - WEB
            - CHAT
            - WHATSAPP
            - IN_APP
            - OTHER
        email:
          description: Support email address.
          type: string
          format: email
        hoursAvailable:
          description: Human-readable support hours (local time)
          type: string
        name:
          description: Name of the support organization or contact.
          type: string
        telephone:
          description: Telephone number.
          type: string
        chat:
          description: Embeddable chat endpoint for support.
          type: string
          format: uri
        url:
          description: Generic URL to a support page.
          type: string
          format: uri
        callbackStatus:
          description: Status of a support callback request. Indicates whether a callback has been requested, scheduled, or completed.
          type: string
      required:
      - '@context'
      - '@type'
      additionalProperties: false

    SupportRequest:
      $id: https://schema.beckn.io/SupportRequest/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: Support request by a user. If no field is set, the user can expect a public support contact
        info
      title: SupportRequest
      type: object
      properties:
        '@context':
          type: string
          format: uri
          default: https://schema.beckn.io/
        '@type':
          type: string
          const: Support
        orderId:
          description: The order against which support is required
          type: string
        ticketIds:
          description: IDs of support ticket if open
          type: array
          items:
            $ref: https://schema.beckn.io/SupportTicket/v2.0#/properties/id
        callbackPhone:
          description: Telephone number of the user for callback.
          type: string
      required:
      - '@context'
      - '@type'
      additionalProperties: false
      x-tags:
      - common

    TrackingRequest:
      $id: https://schema.beckn.io/TrackingRequest/v2.0
      $schema: "https://json-schema.org/draft/2020-12/schema"
      description: Schema definition for TrackingRequest in the Beckn Protocol v2.0.1
      title: TrackingRequest
      x-tags: [common]
      type: object
      properties:
        id:
          description: Tracking reference identifier
          type: string
        callbackUrl:
          description: Optional callback URL for streaming tracking coordinates/updates
          type: string
          format: uri
        modeHint:
          description: Optional delivery mode for the tracking handle.
          type: string
          enum:
          - LINK_ONLY
          - DEEP_LINK
          - WEBHOOK
          - WS_HANDLE
        trackingDataSchema:
          description: A JSON Schema (2020-12) that describes the structure of trackingData payloads.
          $ref: "https://json-schema.org/draft/2020-12/schema"
      required:
      - id
      additionalProperties: false

    Tracking:
      $id: https://schema.beckn.io/Tracking/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: Non-streaming tracking handle per legacy semantics (url/transport/status).
      title: Tracking
      type: object
      properties:
        '@context':
          description: TBD
          type: string
          format: uri
          default: https://schema.beckn.io/
        '@type':
          description: TBD
          type: string
          default: beckn:Tracking
        expiresAt:
          description: ISO 8601 expiry timestamp for the tracking handle.
          type: string
          format: date-time
        trackingStatus:
          type: string
          enum:
          - ACTIVE
          - DISABLED
          - COMPLETED
        url:
          description: Link/handle to off-network tracking UI or endpoint.
          type: string
          format: uri
      required:
      - '@context'
      - '@type'
      - url
      - trackingStatus
      x-jsonld:
        '@type': schema:TrackAction
        trackingStatus: $.trackingStatus
        schema:target: $.url
      additionalProperties: false
      x-tags:
      - common

  # ─── Responses ────────────────────────────────────────────────────
  responses:
    Ack:
      description: Receipt confirmed; signature valid; asynchronous callback will follow.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Ack'

    AckNoCallback:
      description: |
        Request received but no callback will follow (e.g. agents not found,
        inventory unavailable, provider closed, context.try preview complete).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckNoCallback'

    NackBadRequest:
      description: Malformed or invalid request; the server could not parse or validate the payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackBadRequest'

    NackUnauthorized:
      description: Invalid or missing authentication credentials; signature could not be verified.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackUnauthorized'

    ServerError:
      description: Internal failure on the network participant's platform.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerError'
