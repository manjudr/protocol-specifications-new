openapi: 3.1.1
info:
  title: Beckn Protocol V2.0 API Specification
  description: |
    The API specification of Beckn Protocol covering the four stages of an order lifecycle:
    - Discovery: Discovery of catalogs
    - Ordering: Price negotiation, terms negotiation, and order confirmation
    - Fulfillment: Order tracking, status updates, order updates and cancellation
    - Post-fulfillment: Rating, feedback, and customer support
  version: 2.1.0
  contact:
    name: Beckn Protocol
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en

paths:
# Discovery APIs
  /beckn/discover:
    get:
      summary: Discover catalogs on a network
      description: |
        Search and discover catalogs on an open network. This endpoint can be implemented by Catalog Discovery Services, and BPPs. Supports text search, JSONPath-based filtering (RFC 9535), or both together with automatic schema adaptation. This endpoint returns an **ACK/NACK** confirming receipt/validation. Can be implemented by any entity hosting catalogs. 
      operationId: discoverCatalog
      tags: [Catalog Discovery Service, BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                context:
                  allOf:
                    - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          const: discover
                message:
                  $ref: '#/components/schemas/DiscoverMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
          
  /beckn/on_discover:
    post:
      summary: Callback response to `discover` request
      description: |
        Callback endpoint that contains Catalogs hosted by multiple BPPs. This endpoint is called by the BPP to return the search results after processing the discover request. **This endpoint returns only an ACK/NACK** confirming receipt and validation of the catalog payload.
      operationId: onDiscoverCatalog
      tags: [Catalog Publishing Service, BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: on_discover
              message:
                $ref: '#/components/schemas/OnDiscoverMessage'
            examples:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/examples/v2.1/on_discover.examples.yaml'
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  
# Ordering APIs
  /beckn/select:
    post:
      summary: BAP requests for quote
      description: 'The BAP selects the items, item quantities, associated offers, coupon codes, sometimes a proposed bid against a specfic selection, and requests the BPP to provide a quote. This action is performed without sharing any PII of the consumer. This action is particularly useful when the BAP and BPP have an ongoing commercial agreement independent of their users, that allows special rates and entitlements to their respective users. This action is also used for placing anonymous bids on a selection of items, especially during auctions.'
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: select
              message:
                $ref: '#/components/schemas/SelectMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/on_select:
    post:
      summary: BPP sends quote with optional additional forms
      description: 'The BPP calculates the total cost, evaluates offers, verifies coupon codes, the proposed bid (if allowed) against a specfic selection, and generates a quote. At this stage, it is also recommended for the BPP to check the inventory for the availability of the items, or the serviceability of the order. In the case of auctions, the BPP can return the value of the highest bid to prompt the BAP user to match the bid or outbid the current value. Furthermore, in some cases, the BPP may require additional information to be provided initiate the order, sometimes even on external websites. In those cases, the BPP provides links to external forms that need to be filled and submitted before proceeding with the order.'
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: on_select
              message:
                $ref: '#/components/schemas/OnSelectMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/init:
    post:
      summary: BAP requests final draft order with terms
      description: BAP initates the final order by providing all billing, fulfillment, and source payment information required for calculating the final terms of the order, and also references to any form data that may have submitted outside the transaction layer in previous interactions. Upon receiving a successful ACK response, the BAP should expect an `on_init` containing the final draft order with payment terms. Sometimes, the BPP may also send a successful `ACK` with a status code indicating that there may be additional forms that may need to be submitted on external URLs. Until the BAP receives an ACK response with a success code, it must continue calling the `init` endpoint of the BPP. Furthermore, the BAP must ensure that the form links are hosted on a trusted domain with a valid SSL certificate. If the form links are untrustworthy, the BAP MUST send a NACK with an appropriate error code. 
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: init
              message:
                $ref: '#/components/schemas/InitMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/on_init:
    post:
      summary: BPP sends final draft of order with terms of service
      description: BPP provides the final draft of the order after processing the billing, fulfillment, and source payment information provided by the buyer. In this state, the BPP can also send a personalized quote, payment terms, and freebies based on the credentials of the buyer. This is especially useful when the BPP user (i.e the Provider) offers loyalty programs. Furthermore, the BPP can also attach additional form links to the `Order` object requesting the BAP for additional information. Typical forms could include KYC forms, T&Cs and disclaimers, declarations, etc. The form links must contain a reference to the ongoing transaction. This reference is by default, a path or query parameter appended to the form link. The BAP MUST NOT delete this parameter as it will dereference the form data from the underlying transaction, thus rendering it invalid. The BPP MUST ensure that the forms links are trustworthy and are hosted on HTTP/S endpoints with a valid SSL certificate. Until the BPP has received all the information needed to proceed to confirmation, it must continue sending an ACK with a status code indicating the further information is needed from the BAP before proceeding to confirmation. The final on_init call with the draft order MUST contain a credentialized receipt of all form data the BAP user has submitted outside the Beckn API layer. Only the final on_init callback SHOULD contain the payment terms of the BPP. The BPP MUST NOT request the BAP for payment at any point before this stage. 
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: on_init
              message:
                $ref: '#/components/schemas/OnInitMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/confirm:
    post:
      summary: BAP confirms the order
      description: BAP accepts and fulfills any terms required before order confirmation, like payment proofs/references, links to attested documents, form data with submission reference, authorization tokens etc; and requests the BPP to confirm the order. 
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: confirm
              message:
                $ref: '#/components/schemas/ConfirmMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/on_confirm:
    post:
      summary: BPP sends confirmed order
      description: BPP evaluates if all the terms and conditions required for the creation of the order have been accepted and fulfilled (including payment), and sends a confirmed order with Order ID with the latest state of fulfillment. 
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: on_confirm
              message:
                $ref: '#/components/schemas/OnConfirmMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

# Fulfillment APIs
  /beckn/status:
    post:
      summary: BAP requests latest state of the order
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: status
              message:
                $ref: '#/components/schemas/StatusMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/on_status:
    post:
      summary: BPP sends the latest state of the order with fulfillment status.
      description: BPP sends the latest state of the order with fulfillment status. The BPP can independently call this endpoint any number of times without the BAP explicitly requesting it. However, the BPP must receive at least one `status` request from the BAP to initiate the on_status callback stream. The purpose of this endpoint is to notify the BAP users about any changes in the state of fulfillment. Typical scenarios include - the Order being picked up, the order being on its way, order almost at the door, etc. **Note - This endpoint is _NOT_ for real-time tracking - only status updates worth notifying the user through say, a push notification. So it is strongly recommended for BAPs to NOT long poll the BPP with `status` requests.**
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              context:
                allOf:
                  - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        const: on_status
              message:
                $ref: '#/components/schemas/OnStatusMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/update:
    post:
      summary: Request to update and active order
      description: The BAP requests the BPP to update an active order and recalculate the terms, including payment. The updates may involve change of items, item quantities, billing information, fulfillment information, or payment information.'
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                # Branch 1: context.try === true -> OnUpdateInitMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            action:
                              const: update
                            try:
                              const: true
                    message:
                      $ref: '#/components/schemas/UpdateInitMessage'

                # Branch 2: context.try === false -> OnUpdateConfirmMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            action:
                              const: update
                            try:
                              const: false
                    message:
                      $ref: '#/components/schemas/UpdateConfirmMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/on_update:
    post:
      summary: BPP sends updated order with updated terms, including payment.
      description: 'The BPP sends an updated order with recalculated quote and payment terms. Typical scenarios include a fulfillment agent being allocated or reallocated, items updated or removed from the order, payment information updated, etc. This endpoint can be called any number of times by the BPP without the BAP explicitly requesting for it. Furthermore, the BPP may also use the `on_update` endpoint to request the user for additional information submitted via external form links to the `Order` object requesting the BAP for additional information. Typical forms could include KYC forms, T&Cs and disclaimers, declarations, etc. The form links must contain _two_ references to the ongoing transaction, namely - the `transaction_id` and the `order_id`, appended as a path or query parameter to the form URL. The BAP MUST NOT delete these parameters as it will dereference the form data from the underlying transaction, thus rendering it invalid. The BPP MUST ensure that the forms links are trustworthy and are hosted on HTTP/S endpoints with a valid SSL certificate. Until the BPP has received all the information needed to proceed to confirmation, it MUST continue sending multiple `on_update` calls with a status code indicating the further information is needed from the BAP before proceeding to confirmation. Each `on_update` call with the draft order MUST contain a credentialized receipt of all form data the BAP user has submitted outside the Beckn API layer. As the order is already active, the MAY request the BAP for payment at any point in this state.'
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                # Branch 1: context.try === true -> OnUpdateInitMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            action:
                              const: on_update
                            try:
                              const: true
                    message:
                      $ref: '#/components/schemas/OnUpdateInitMessage'

                # Branch 2: context.try === false -> OnUpdateConfirmMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            action:
                              const: on_update
                            try:
                              const: false
                    message:
                      $ref: '#/components/schemas/OnUpdateConfirmMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/cancel:
    post:
      summary: Request to cancel an order
      description: 'TODO'
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                # Branch 1: context.try === true -> CancelInitMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            action:
                              const: cancel
                            try:
                              const: true
                    message:
                      $ref: '#/components/schemas/CancelInitMessage'

                # Branch 2: context.try === false -> CancelConfirmMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            action:
                              const: cancel
                            try:
                              const: false
                    message:
                      $ref: '#/components/schemas/CancelConfirmMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/on_cancel:
    post:
      summary: Provider returns cancelled order (may reflect refund/payment update via PaymentRef)
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                # Branch 1: context.try === true -> OnCancelInitMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            action:
                              const: on_cancel
                            try:
                              const: true
                    message:
                      $ref: '#/components/schemas/OnCancelInitMessage'

                # Branch 2: context.try === false -> OnCancelConfirmMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            action:
                              const: on_cancel
                            try:
                              const: false
                    message:
                      $ref: '#/components/schemas/OnCancelConfirmMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  
  /beckn/track:
    post:
      summary: Track order
      description: Request to track an active order in real-time
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          const: track
                message:
                  $ref: '#/components/schemas/TrackMessage'

      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  
  /beckn/on_track:
    post:
      summary: Send real-time tracking handles for an active order
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          const: on_track
                message:
                  $ref: '#/components/schemas/OnTrackMessage'

      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

# Post-fulfillment APIs

  /beckn/rate:
    post:
      summary: Rate any aspect of an order.
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                # Branch 1: context.try === true -> OnUpdateInitMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            try:
                              const: true
                            action:
                              const: rate
                    message:
                      $ref: '#/components/schemas/RateInitMessage'

                # Branch 2: context.try === false -> OnUpdateConfirmMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            try:
                              const: false
                            action:
                              const: rate
                    message:
                      $ref: '#/components/schemas/RateConfirmMessage'
                      
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/on_rate:
    post:
      summary: Provider acknowledges/returns rating receipt (optional aggregate snapshot)
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                # Branch 1: context.try === true -> OnUpdateInitMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            try:
                              const: true
                            action:
                              const: on_rate
                    message:
                      $ref: '#/components/schemas/OnRateInitMessage'

                # Branch 2: context.try === false -> OnUpdateConfirmMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            try:
                              const: false
                            action:
                              const: on_rate
                    message:
                      $ref: '#/components/schemas/OnRateConfirmMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/support:
    post:
      summary: Request support details for an entity (order/item/provider/etc.)
      tags: [BPP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                # Branch 1: context.try === true -> OnSupportInitMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            try:
                              const: true
                            action:
                              const: support
                    message:
                      $ref: '#/components/schemas/OnSupportInitMessage'

                # Branch 2: context.try === false -> OnSupportConfirmMessage
                - type: object
                  required: [context, message]
                  properties:
                    context:
                      allOf:
                        - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                        - type: object
                          properties:
                            try:
                              const: false
                            action:
                              const: support
                    message:
                      $ref: '#/components/schemas/OnSupportConfirmMessage'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/on_support:
    post:
      summary: Provider returns support details
      tags: [BAP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          const: on_support
                message:
                  type: object
                  required: [support]
                  properties:
                    support:
                      $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/SupportInfo'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'
  
# Catalog Publishing Service APIs

  /beckn/catalog/publish:
    post:
      summary: Publish one or more catalogs for indexing
      description: |
        BPP submits catalogs to be indexed. Returns **ACK** immediately if accepted for processing.
        The detailed per-catalog processing result arrives later via **/on_publish**.
      operationId: publishCatalogs
      tags: [Catalog Publishing Service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          const: catalog/publish
                message:
                  $ref: '#/components/schemas/CatalogPublishMessage'

            examples:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/examples/v2.1/on_publish.examples.yaml'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

  /beckn/catalog/on_publish:
    post:
      summary: Callback with catalog publish processing results
      description: |
        Discovery Service calls back with per-catalog processing results (accepted/rejected, errors, derived stats).
        The receiver should respond with an **AckResponse**.
      operationId: onCatalogPublish
      tags: [Provider]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/attributes.yaml#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          const: catalog/on_publish
                message:
                  $ref: '#/components/schemas/CatalogOnPublishMessage'
            examples:
              $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/examples/v2.1/on_publish.examples.yaml'
      responses:
        '200':
          $ref: '#/components/responses/Ack200'
        '400':
          $ref: '#/components/responses/Ack400'
        '500':
          $ref: '#/components/responses/Ack500'

