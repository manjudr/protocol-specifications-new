<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Migration notice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f7"/>
      <stop offset="1" stop-color="#fffdfd"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b42318"/>
      <stop offset="1" stop-color="#7a271a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <style>
      .ui { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .h1 { font-size: 34px; font-weight: 800; fill: #111827; }
      .h1b { font-size: 34px; font-weight: 900; fill: #b42318; }
      .k { font-size: 18px; font-weight: 800; fill: #111827; }
      .p { font-size: 18px; font-weight: 500; fill: #374151; }
      .small { font-size: 16px; font-weight: 500; fill: #6b7280; }
      .label { font-size: 18px; font-weight: 900; letter-spacing: 3px; fill: #b42318; }
      .pill { font-size: 16px; font-weight: 800; }
      .btn { font-size: 18px; font-weight: 900; fill: #fff; }
      .btn2 { font-size: 18px; font-weight: 900; fill: #7a271a; }
      a { cursor: pointer; }
    </style>
  </defs>

  <!-- Card -->
  <rect x="40" y="40" width="1120" height="440" rx="26" fill="url(#bg)" stroke="#b42318" stroke-width="3" filter="url(#shadow)"/>

  <!-- Left icon -->
  <rect x="76" y="86" width="72" height="72" rx="16" fill="url(#warn)"/>
  <text x="112" y="134" text-anchor="middle" class="ui" font-size="40" font-weight="900" fill="#fff">⚠</text>

  <!-- Header: MIGRATION NOTICE + pills -->
  <text x="170" y="120" class="ui label">MIGRATION NOTICE</text>

  <!-- Effective pill -->
  <rect x="485" y="92" width="230" height="38" rx="19" fill="#fde2e0" stroke="#f4b6b2"/>
  <text x="500" y="118" class="ui pill" fill="#7a271a">Effective: 2026-02-06</text>

  <!-- Removal pill -->
  <rect x="730" y="92" width="220" height="38" rx="19" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="745" y="118" class="ui pill" fill="#075985">Removal: 2026-02-20</text>

  <!-- Headline -->
  <text x="170" y="182" class="ui h1">This folder is being moved.</text>
  <text x="635" y="182" class="ui h1b"> Migrate now.</text>

  <!-- Body -->
  <text x="170" y="236" class="ui k">What’s changing:</text>
  <text x="330" y="236" class="ui p">This schema folder is being moved to</text>

  <!-- Link-like text (visual only; hyperlink below is separate) -->
  <text x="736" y="236" class="ui" font-size="18px" font-weight="800" fill="#075985">DEG Specification</text>

  <text x="170" y="270" class="ui k">Impact:</text>
  <text x="250" y="270" class="ui p">Run-time references to files in this folder may continue to work until the removal date,</text>
  <text x="170" y="300" class="ui p">after which they will fail.</text>

  <!-- Recommended action panel -->
  <rect x="170" y="330" width="950" height="170" rx="18" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="200" y="368" class="ui" font-size="18px" font-weight="900" fill="#111827">Recommended action</text>

  <!-- Ordered list -->
  <text x="212" y="408" class="ui p">1. Switch to</text>
  <text x="325" y="408" class="mono" font-size="17px" font-weight="800" fill="#111827">DEG Specification Repository</text>
  <text x="680" y="408" class="ui p">(see</text>
  <text x="715" y="408" class="ui" font-size="18px" font-weight="900" fill="#075985">Announcements</text>
  <text x="840" y="408" class="ui p">).</text>

  <text x="212" y="442" class="ui p">2. Update your integrations before</text>
  <text x="520" y="442" class="ui" font-size="18px" font-weight="900" fill="#111827">2026-02-20</text>
  <text x="625" y="442" class="ui p">.</text>

  <text x="212" y="476" class="ui p">3. If blocked, open an issue with logs and request context.</text>

  <!-- Buttons (visual) -->
  <rect x="170" y="520" width="0" height="0" rx="0" fill="transparent"/>

  <rect x="170" y="520" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Buttons row -->
  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Buttons (placed below panel, inside card) -->
  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Actual buttons area -->
  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Move buttons up into the card -->
  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Buttons -->
  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Buttons (correct coordinates) -->
  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Place buttons at y=455 area (inside card, below panel) -->
  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Buttons at bottom of card -->
  <rect x="170" y="515" width="0" height="0" rx="0" fill="transparent"/>

  <!-- Actual: buttons at y=455 -->
  <rect x="170" y="455" width="260" height="52" rx="14" fill="#075985"/>
  <text x="200" y="488" class="ui btn">Read migration guide →</text>

  <rect x="445" y="455" width="210" height="52" rx="14" fill="#fde2e0" stroke="#f4b6b2"/>
  <text x="475" y="488" class="ui btn2">Report an issue</text>

  <!-- Heads-up -->
  <text x="170" y="430" class="ui" font-size="16px" font-weight="900" fill="#111827">Heads-up:</text>
  <text x="260" y="430" class="ui small">If you maintain downstream specs or SDKs, pin versions and communicate timelines clearly.</text>

  <!-- OPTIONAL clickable link overlays (edit hrefs) -->
  <!-- Replace the href values with your actual URLs -->
  <a href="REPLACEMENT_LINK">
    <rect x="732" y="216" width="170" height="28" fill="transparent"/>
  </a>
  <a href="ANNOUNCEMENTS_LINK">
    <rect x="710" y="388" width="155" height="26" fill="transparent"/>
  </a>
  <a href="MIGRATION_GUIDE_LINK">
    <rect x="170" y="455" width="260" height="52" fill="transparent"/>
  </a>
  <a href="ISSUE_LINK">
    <rect x="445" y="455" width="210" height="52" fill="transparent"/>
  </a>
</svg>
