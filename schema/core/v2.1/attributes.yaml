        '@context':
          const: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld'
          format: uri
          type: string
        '@type':
          enum:
          - beckn:Skill
          type: string
        beckn:category:
          $ref: '#/components/schemas/CategoryCode'
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          type: string
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      type: object
    SpatialConstraint:
      type: object
      description: >
        **Spatial predicate** using **OGC CQL2 (JSON semantics)** applied to one or more geometry targets in an item. This is where clients express spatial intent.

        Key ideas: - `targets`: one or more **JSONPath-like** pointers that locate geometry

          fields within each item document (e.g., `$['beckn:availableAt'][*]['geo']`).
        - `op`: spatial operator (CQL2). Common ones:

            • `S_WITHIN`     (A is completely inside B)
            • `S_INTERSECTS` (A intersects B)
            • `S_CONTAINS`   (A contains B)
            • `S_DWITHIN`    (A within distance of B)
        - `geometry`: **GeoJSON** literal used as the predicate reference geometry. - `distanceMeters`: required for `S_DWITHIN` when using a GeoJSON Point/shape. - `quantifier`: if a target resolves to an array, choose whether **ANY** (default),

          **ALL**, or **NONE** of elements must satisfy the predicate.

        CRS: unless otherwise stated, all coordinates are **EPSG:4326**.

      required: [op, targets]
      properties:
        op:
          type: string
          enum:
            - S_WITHIN
            - S_CONTAINS
            - S_INTERSECTS
            - S_DISJOINT
            - S_OVERLAPS
            - S_CROSSES
            - S_TOUCHES
            - S_EQUALS
            - S_DWITHIN
          description: OGC CQL2 spatial operator.
        targets:
          description: >
            One or more JSONPath-like pointers to geometry fields within the item. Example pointers: - `$['beckn:availableAt'][*]['geo']` (array of site Points) - `$['beckn:itemAttributes']['ride:dropOff']['geo']` (drop zone Polygon)

          oneOf:
            - type: string
            - type: array
              items: {type: string}
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
        distanceMeters:
          type: number
          minimum: 0
          description: >
            For `S_DWITHIN`: maximum distance in meters from the target geometry to `geometry` (e.g., "within 5000 m of this Point"). Ignored for other ops.

        quantifier:
          type: string
          enum: [ANY, ALL, NONE]
          default: any
          description: >
            How to evaluate when `targets` resolves to an array: - **any**: at least one element matches (default) - **all**: every element must match - **none**: no element may match

        srid:
          type: string
          description: >
            Coordinate Reference System identifier for `geometry`. Default is `"EPSG:4326"`. If provided, servers MAY reproject to EPSG:4326 internally.

          example: "EPSG:4326"
      additionalProperties: false
      examples:
        within_circle_as_distance:
          summary: EV sites within 5 km of a center (via S_DWITHIN)
          value:
            op: S_DWITHIN
            targets: "$['beckn:availableAt'][*]['geo']"
            geometry:
              type: Point
              coordinates: [77.5946, 12.9716]
            distanceMeters: 5000
        pickup_at_point:
          summary: Pickup at a defined point (GeoJSON Point)
          description: >
            Example of a DiscoverRequest spatial constraint representing a specific pickup location. The requester defines a GeoJSON Point as the pickup location, and the server finds providers whose service area **contains** this point.

          value:
            op: S_CONTAINS
            targets: "$['beckn:itemAttributes']['ride:serviceArea']['geo']" # provider polygon field
            geometry:
              type: Point
              coordinates: [77.5946, 12.9716] # MG Road (Bengaluru) — [lon, lat]              
        drop_intersects_user_box:
          summary: Provider drop zone intersects user’s rectangle
          value:
            op: S_INTERSECTS
            targets: "$['beckn:itemAttributes']['ride:dropOff']['geo']"
            geometry:
              type: Polygon
              coordinates:
                - [[77.6100, 12.9200], [77.6400, 12.9200], [77.6400, 12.9500], [77.6100, 12.9500], [77.6100, 12.9200]]
        pickup_location_example:
          summary: A defined pickup location object
          value:
            geo:
              type: Point
              coordinates: [77.5946, 12.9716] # [lon, lat]
            address:
              streetAddress: "MG Road"
              addressLocality: "Bengaluru"
              addressRegion: "Karnataka"
              postalCode: "560001"
              addressCountry: "IN"
    State:
      additionalProperties: false
      properties:
        '@context':
          const: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld'
          format: uri
          type: string
        '@type':
          enum:
          - beckn:State
          type: string
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          description: State code/identifier
          type: string
      required:
      - '@context'
      - '@type'
      - beckn:id
      type: object
    SupportInfo:
      additionalProperties: false
      description: 'Canonical support contact for an entity, mapped to schema.org ContactPoint.'
      example:
        channels:
        - web
        - phone
        - email
        email: support@acme.example
        hours: Mon–Sat 09:00–20:00 IST
        name: Acme Support
        phone: +91-80-1234-5678
        url: https://acme.example/support
      properties:
        '@context':
          const: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld'
          format: uri
          type: string
        '@type':
          enum:
          - beckn:SupportInfo
          type: string
          x-jsonld:
            '@id': beckn:SupportInfo
        channels:
          description: Available support channels.
          items:
            enum:
            - PHONE
            - EMAIL
            - WEB
            - CHAT
            - WHATSAPP
            - IN_APP
            - OTHER
            type: string
          type: array
        email:
          description: Support email address.
          format: email
          type: string
        hours:
          description: Human-readable support hours (local time).
          type: string
        name:
          description: Name of the support organization or contact.
          type: string
        phone:
          description: Telephone number.
          type: string
        url:
          description: Webpage or chat endpoint for support.
          format: uri
          type: string
      required:
      - '@context'
      - '@type'
      type: object
      x-jsonld:
        '@type': schema:ContactPoint
        schema:contactType: '"Customer Support"'
        schema:email: $.email
        schema:hoursAvailable: $.hours
        schema:name: $.name
        schema:telephone: $.phone
        schema:url: $.url
    SupportMethod:
      type: string
      # TODO : Taken from support endpoints. Define this schema
    SupportTicket:
      type: object
      # TODO : Taken from support endpoints. Define this schema
    TimePeriod:
      anyOf:
      - required:
        - schema:startDate
      - required:
        - schema:endDate
      - required:
        - schema:startTime
        - schema:endTime
      description: Time window with date-time precision for availability/validity
      properties:
        '@type':
          description: JSON-LD type for a date-time period
          example: beckn:TimePeriod
          type: string
        schema:endDate:
          description: End instant (exclusive or inclusive per domain semantics)
          example: '2025-12-31T23:59:59Z'
          format: date-time
          type: string
        schema:endTime:
          description: End time of the time period
          example: '22:00:00'
          format: time
          type: string
        schema:startDate:
          description: Start instant (inclusive)
          example: '2025-01-27T09:00:00Z'
          format: date-time
          type: string
        schema:startTime:
          description: Start time of the time period
          example: 09:00:00
          format: time
          type: string
      required:
      - '@type'
      type: object
    TrackAction:
      additionalProperties: true
      description: Minimal schema.org TrackAction for clickable tracking.
      properties:
        id:
          description: Tracking action identifier
          type: string
          x-jsonld:
            '@id': schema:identifier
        url:
          description: Tracking page URL
          format: uri
          type: string
          x-jsonld:
            '@id': schema:url
      type: object
      x-jsonld:
        '@type': schema:TrackAction
    TrackingRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Tracking reference identifier
        callbackUrl:
          type: string
          format: uri
          description: Optional callback URL for streaming tracking coordinates/updates
        mode_hint:
          type: string
          description: Optional delivery mode for the tracking handle.
          enum: [link_only, deep_link, webhook, ws_handle]
    Tracking:
      additionalProperties: false
      description: 'Non-streaming tracking handle per legacy semantics (url/transport/status).'
      example:
        expires_at: '2025-10-16T18:30:00Z'
        tl_method: http/get
        trackingStatus: active
        url: https://track.bpp.example?order_id=ORD-123
      properties:
        '@context':
          const: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld'
          format: uri
          type: string
        '@type':
          enum:
          - beckn:Tracking
          type: string
          x-jsonld:
            '@id': beckn:Tracking
        beckn:state:
          $ref: '#/components/schemas/State'
        expires_at:
          description: ISO 8601 expiry timestamp for the tracking handle.
          format: date-time
          type: string
        tl_method:
          description: Transport/method used to access the tracking handle.
          enum:
          - http/get
          - http/post
          - http/redirect
          - ws/handle
          - custom
          type: string
        trackingStatus:
          enum:
          - ACTIVE
          - DISABLED
          - COMPLETED
          type: string
        url:
          description: Link/handle to off-network tracking UI or endpoint.
          format: uri
          type: string
      required:
      - '@context'
      - '@type'
      - tl_method
      - url
      - trackingStatus
      type: object
      x-jsonld:
        '@type': schema:TrackAction
        beckn:trackingStatus: $.trackingStatus
        schema:deliveryMethod: $.tl_method
        schema:target: $.url

    # ---------- Result model ----------
    CatalogProcessingResult:
      type: object
      required: [catalogId, status]
      properties:
        catalogId:
          type: string
          description: The "beckn:id" of the submitted catalog
        status:
          type: string
          enum: [ACCEPTED, REJECTED, PARTIAL]
          description: Final processing outcome for this catalog
        itemCount:
          type: integer
          minimum: 0
          description: Number of items indexed (when accepted/partial)
        warnings:
          type: array
          description: Non-fatal issues encountered
          items:
            $ref: '#/components/schemas/ProcessingNotice'
        error:
          $ref: 'https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2/attributes.yaml#/components/schemas/Error'
    ProcessingNotice:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    MediaSearch:
      type: object
      description: >
        Container for multimodal search inputs and configuration. Supports searching through **images, audio notes, and videos** alongside text, filters, and spatial predicates. For GET, this object should be JSON-encoded and URL-escaped.
      properties:
        media:
          type: array
          description: >
            One or more references to **images, audio notes, or videos** supplied as part of a multimodal search. Each entry references a media resource accessible via HTTPS or data URI.
          items:
            $ref: '#/components/schemas/MediaInput'
          example:
            - id: "snap-1"
              type: image
              url: "https://cdn.example.com/user/snaps/ccs2-cable.jpg"
              contentType: "image/jpeg"
        options:
          $ref: '#/components/schemas/MediaSearchOptions'
          description: >
            Options controlling how the discovery engine interprets the supplied media — e.g., whether to perform OCR/ASR, semantic similarity, or object detection.
      additionalProperties: false
      example:
        media:
          - id: "snap-1"
            type: image
            url: "https://cdn.example.com/user/snaps/ccs2-cable.jpg"
            contentType: "image/jpeg"
        options:
          goals: ["VISUAL_OBJECT_DETECT", "TEXT_FROM_IMAGE"]
          augmentTextSearch: true
  