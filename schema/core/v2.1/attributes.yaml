        schema:itemReviewed: $.id
        schema:ratingValue: $.value
        schema:worstRating: $.worst
      additionalProperties: false
    Skill:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Skill
        beckn:category:
          $ref: '#/components/schemas/CategoryCode'
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          type: string
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      additionalProperties: false
    SpatialConstraint:
      description: "**Spatial predicate** using **OGC CQL2 (JSON semantics)** applied to one or more geometry targets in an\
        \ item. This is where clients express spatial intent.\nKey ideas: - `targets`: one or more **JSONPath-like** pointers\
        \ that locate geometry\n\n  fields within each item document (e.g., `$['beckn:availableAt'][*]['geo']`).\n- `op`:\
        \ spatial operator (CQL2). Common ones:\n\n    • `S_WITHIN`     (A is completely inside B)\n    • `S_INTERSECTS` (A\
        \ intersects B)\n    • `S_CONTAINS`   (A contains B)\n    • `S_DWITHIN`    (A within distance of B)\n- `geometry`:\
        \ **GeoJSON** literal used as the predicate reference geometry. - `distanceMeters`: required for `S_DWITHIN` when\
        \ using a GeoJSON Point/shape. - `quantifier`: if a target resolves to an array, choose whether **ANY** (default),\n\
        \n  **ALL**, or **NONE** of elements must satisfy the predicate.\n\nCRS: unless otherwise stated, all coordinates\
        \ are **EPSG:4326**.\n"
      type: object
      properties:
        op:
          description: OGC CQL2 spatial operator.
          type: string
          enum:
          - S_WITHIN
          - S_CONTAINS
          - S_INTERSECTS
          - S_DISJOINT
          - S_OVERLAPS
          - S_CROSSES
          - S_TOUCHES
          - S_EQUALS
          - S_DWITHIN
        targets:
          description: 'One or more JSONPath-like pointers to geometry fields within the item. Example pointers: - `$[''beckn:availableAt''][*][''geo'']`
            (array of site Points) - `$[''beckn:itemAttributes''][''ride:dropOff''][''geo'']` (drop zone Polygon)

            '
          oneOf:
          - type: string
          - type: array
            items:
              type: string
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
        distanceMeters:
          description: 'For `S_DWITHIN`: maximum distance in meters from the target geometry to `geometry` (e.g., "within
            5000 m of this Point"). Ignored for other ops.

            '
          type: number
          minimum: 0
        quantifier:
          description: 'How to evaluate when `targets` resolves to an array: - **any**: at least one element matches (default)
            - **all**: every element must match - **none**: no element may match

            '
          type: string
          enum:
          - ANY
          - ALL
          - NONE
          default: any
        srid:
          description: 'Coordinate Reference System identifier for `geometry`. Default is `"EPSG:4326"`. If provided, servers
            MAY reproject to EPSG:4326 internally.

            '
          type: string
          example: EPSG:4326
      required:
      - op
      - targets
      additionalProperties: false
      examples:
        - $ref: '../../examples/v2.1/SpatialConstraint.examples.yaml#/within_circle'
        - $ref: '../../examples/v2.1/SpatialConstraint.examples.yaml#/pickup_at_point'
        - $ref: '../../examples/v2.1/SpatialConstraint.examples.yaml#/drop_intersects'
        - $ref: '../../examples/v2.1/SpatialConstraint.examples.yaml#/pickup_location'
    State:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:State
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          description: State code/identifier
          type: string
      required:
      - '@context'
      - '@type'
      - beckn:id
      additionalProperties: false
    SupportInfo:
      description: Canonical support contact for an entity, mapped to schema.org ContactPoint.
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:SupportInfo
          x-jsonld:
            '@id': beckn:SupportInfo
        channels:
          description: Available support channels.
          type: array
          items:
            type: string
            enum:
            - PHONE
            - EMAIL
            - WEB
            - CHAT
            - WHATSAPP
            - IN_APP
            - OTHER
        email:
          description: Support email address.
          type: string
          format: email
        hours:
          description: Human-readable support hours (local time).
          type: string
        name:
          description: Name of the support organization or contact.
          type: string
        phone:
          description: Telephone number.
          type: string
        url:
          description: Webpage or chat endpoint for support.
          type: string
          format: uri
      required:
      - '@context'
      - '@type'
