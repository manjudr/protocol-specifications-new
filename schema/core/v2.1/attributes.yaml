          enum:
          - INITIATED
          - PENDING
          - AUTHORIZED
          - CAPTURED
          - COMPLETED
          - FAILED
          - CANCELLED
          - REFUNDED
          - PARTIALLY_REFUNDED
          - CHARGEBACK
          - DISPUTED
