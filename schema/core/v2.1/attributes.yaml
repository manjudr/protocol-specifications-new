openapi: 3.1.1
info:
  title: Beckn Core Schemas v2
  description: Core schemas for the Beckn Protocol v2. This file contains the fundamental object structures and payload shapes used when executing discovery, ordering, fulfillment, post-fulfillment and other workflows on Beckn
  version: 2.1.0
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    AcceptedPaymentMethod:
      description: Payment methods accepted for this offer
      type: array
      items:
        type: string
        enum:
        - UPI
        - CREDIT_CARD
        - DEBIT_CARD
        - WALLET
        - BANK_TRANSFER
        - CASH
        - APPLE_PAY
      x-jsonld:
        '@id': beckn:acceptedPaymentMethod
      examples:
        - $ref: '../../examples/v2.1/AcceptedPaymentMethod.examples.yaml#/basic'
    AckResponse:
      type: object
      properties:
        ack_status:
          type: string
          enum:
          - ACK
          - NACK
        error:
          $ref: '#/components/schemas/Error'
        timestamp:
          type: string
          format: date-time
        transaction_id:
          type: string
      required:
      - transaction_id
      - timestamp
      - ack_status
      additionalProperties: false
      allOf:
      - if:
          properties:
            ack_status:
              const: NACK
          required:
          - ack_status
        then:
          required:
          - error
      - if:
          properties:
            ack_status:
              const: ACK
          required:
          - ack_status
        then:
          not:
            required:
            - error
    Address:
      description: '**Postal address** aligned with schema.org `PostalAddress`. Use for human-readable addresses. Geometry
        lives in `Location.geo` as GeoJSON.'
      type: object
      properties:
        addressCountry:
          description: Country name or ISO-3166-1 alpha-2 code.
          type: string
          example: IN
        addressLocality:
          description: City/locality.
          type: string
          example: Bengaluru
        addressRegion:
          description: State/region/province.
          type: string
          example: Karnataka
        extendedAddress:
          description: Address extension (apt/suite/floor, C/O).
          type: string
          example: Apt 4B
        postalCode:
          description: Postal/ZIP code.
          type: string
          example: '560001'
        streetAddress:
          description: Street address (building name/number and street).
          type: string
          example: 123 Tech Street
      additionalProperties: false
    Alert:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Alert
        beckn:affectedEntities:
          description: IDs of entities affected (route/order/fulfillment/etc.)
          type: array
          items:
            type: string
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          type: string
        beckn:severity:
          type: string
        beckn:validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      additionalProperties: false
    Attributes:
      description: JSON-LD aware container for domain-specific attributes of an Item. MUST include @context (URI) and @type
        (compact or full IRI). Any additional properties are allowed and interpreted per the provided JSON-LD context.
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the specific domain schema (e.g., ElectronicItem)
          type: string
          format: uri
          example: https://example.org/schema/items/v1/ElectronicItem/schema-context.jsonld
        '@type':
          description: JSON-LD type within the domain schema
          type: string
          example: beckn:ElectronicItem
      required:
      - '@context'
      - '@type'
      additionalProperties: true
      minProperties: 2
    Consumer:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Consumer
          x-jsonld:
            '@id': schema:Thing
        beckn:buyerAttributes:
          description: 'Attribute Pack reference for richer identity: # buyer/identity.v1 (contact details: email, phone,
            address) # buyer/org-ids.v1 (LEI, GSTIN, ISIN, CUSIP…) # buyer/kyc.v1 (jurisdictional compliance fields) # buyer/preferences.v1
            (delivery preferences, accessibility needs, etc.)'
          allOf:
            - $ref: '#/components/schemas/Attributes'
        beckn:displayName:
          description: Human-readable display name
          type: string
          x-jsonld:
            '@id': schema:name
        beckn:email:
          description: Email Address
          type: string
          x-jsonld:
            '@id': schema:email
          format: email
        beckn:id:
          description: Unique identifier for the buyer (personId or orgId in legacy schema)
          type: string
          x-jsonld:
            '@id': schema:identifier
        beckn:role:
          description: The functional role of the buyer in the transaction.
          type: string
          x-jsonld:
            '@id': schema:roleName
        beckn:taxID:
          description: Tax identifier for the buyer.
          type: string
          x-jsonld:
            '@id': schema:taxID
        beckn:telephone:
          description: Telephone number
          type: string
          x-jsonld:
            '@id': schema:telephone
      required:
      - '@context'
      - '@type'
      - beckn:id
      additionalProperties: false
    CancellationOutcome:
      type: object
      properties:
        descriptor:
          $ref: '#/components/schemas/Descriptor'
    CancellationPolicy:
      type: object
      properties:
        descriptor:
          $ref: '#/components/schemas/Descriptor'
    CancellationReason:
      type: object
      properties:
        descriptor:
          $ref: '#/components/schemas/Descriptor'
    Catalog:
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the core Catalog schema
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          description: Type of the catalog
          type: string
          example: beckn:Catalog
        beckn:bppId:
          description: BPP (Beckn Protocol Provider) identifier that publishes this catalog
          type: string
          example: bpp.example.com
        beckn:bppUri:
          description: BPP (Beckn Protocol Provider) URI endpoint
          type: string
          format: uri
          example: https://bpp.example.com
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          description: Unique identifier for the catalog
          type: string
          example: catalog-electronics-001
        beckn:isActive:
          description: Whether the catalog is active
          type: boolean
          default: true
        beckn:items:
          description: Array of beckn core Item entities in this catalog, returned directly without ItemResult wrapper for
            improved performance and simplified response structure
          type: array
          items:
            $ref: '#/components/schemas/Item'
        beckn:offers:
          type: array
          items:
            $ref: '#/components/schemas/Offer'
        beckn:providerId:
          description: Reference to the provider that owns this catalog
          type: string
          example: tech-store-001
        beckn:validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      - beckn:bppId
      - beckn:bppUri
      - beckn:items
      additionalProperties: false
    CategoryCode:
      type: object
      properties:
        '@type':
          description: Type of the category code
          type: string
          enum:
          - schema:CategoryCode
          example: schema:CategoryCode
        schema:codeValue:
          description: Category code value
          type: string
          example: electronics
        schema:description:
          description: Category description
          type: string
          example: Electronic devices and equipment
        schema:name:
          description: Category name
          type: string
          example: Electronics
      required:
      - '@type'
      - schema:codeValue
    Constraint:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Constraint
        beckn:constraintType:
          description: Type of constraint (extensible term)
          type: string
        beckn:id:
          description: Identifier for the constraint
          type: string
        beckn:operator:
          description: Comparator/operator (<=, >=, =, etc.)
          type: string
        beckn:unitCode:
          description: Unit code (e.g., km, min)
          type: string
        beckn:validity:
          $ref: '#/components/schemas/TimePeriod'
        beckn:value:
          description: Constraint value
          type: number
      required:
      - '@context'
      - '@type'
      - beckn:id
      additionalProperties: false
    Context:
      description: Every API call in beckn protocol has a context. It provides a high-level overview to the receiver about
        the nature of the intended transaction. Typically, it is the BAP that sets the transaction context based on the consumer's
        location and action on their UI. But sometimes, during unsolicited callbacks, the BPP also sets the transaction context
        but it is usually the same as the context of a previous full-cycle, request-callback interaction between the BAP and
        the BPP. The context object contains four types of fields. <ol><li>Demographic information about the transaction using
        fields like `domain`, `country`, and `region`.</li><li>Addressing details like the sending and receiving platform's
        ID and API URL.</li><li>Interoperability information like the protocol version that implemented by the sender and,</li><li>Transaction
        details like the method being called at the receiver's endpoint, the transaction_id that represents an end-to-end
        user session at the BAP, a message ID to pair requests with callbacks, a timestamp to capture sending times, a ttl
        to specifiy the validity of the request, and a key to encrypt information if necessary.</li></ol> This object must
        be passed in every interaction between a BAP and a BPP. In HTTP/S implementations, it is not necessary to send the
        context during the synchronous response. However, in asynchronous protocols, the context must be sent during all interactions,
      type: object
      properties:
        action:
          description: The Beckn protocol method being called by the sender and executed at the receiver.
          type: string
        bapId:
          description: A globally unique identifier of the BAP, Typically it is the fully qualified domain name (FQDN) of
            the BAP
          type: string
        bapUri:
          description: API URL of the BAP for accepting callbacks from BPPs.
          type: string
          format: uri
        bppId:
          description: A globally unique identifier of the BAP, Typically it is the fully qualified domain name (FQDN) of
            the BAP
          type: string
        bppUri:
          description: API URL of the BPP for accepting calls from BAPs.
          type: string
          format: uri
        messageId:
          description: This is a unique value which persists during a request / callback cycle. Since beckn protocol APIs
            are asynchronous, BAPs need a common value to match an incoming callback from a BPP to an earlier call. This value
            can also be used to ignore duplicate messages coming from the BPP. It is recommended to generate a fresh message_id
            for every new interaction. When sending unsolicited callbacks, BPPs must generate a new message_id.
          type: string
          format: uuid
        networkId:
          description: A unique identifier representing a group of platforms. By default, it is the url of the network registry
            on the Beckn network
          type: string
        schemas:
          description: Optional JSON-LD context URLs relevant to the items/offers in this transaction
          type: array
          items:
            type: string
            format: uri
        timestamp:
          description: Time of request generation in RFC3339 format
          type: string
          format: date-time
        transactionId:
          description: This is a unique value which persists across all API calls from `search` through `confirm`. This is
            done to indicate an active user session across multiple requests. The BPPs can use this value to push personalized
            recommendations, and dynamic offerings related to an ongoing transaction despite being unaware of the user active
            on the BAP.
          type: string
          format: uuid
        try:
          description: A flag to indicate that this request is intended to 'try' an operation. Typically set to `false` by
            default, but set to `true` when negotiating terms, updating or cancelling an active order. When set to `true`,
            the receiver must respond with the expected consequences as per the terms of service initially agreed between
            the BAP and the BPP during the `init/on_init` cycle. For example, A BAP will set this flag to `true` when requesting
            the BPP to cancel the order. Upon receiving this the BPP could respond with updated cost, cancellation fees, reasons
            for cancellation, a cancellation form, payment links, and any additional notifications or prompts informing the
            BAP about future consequences if continued (like an account ban, or reduced rating). When both participants are
            ready to continue the transaction, this flag MUST be set back to `false`.
          type: boolean
          default: false
        ttl:
          description: The duration in ISO8601 format after timestamp for which this message holds valid
          type: string
        version:
          description: Version of beckn protocol being used by the sender
          type: string
          const: 2.1.0
    Credential:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Credential
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:expiresAt:
          type: string
          format: date-time
        beckn:id:
          type: string
        beckn:issueDate:
          type: string
          format: date-time
        beckn:issuer:
          description: Issuing authority/entity
          type: string
        beckn:number:
          description: Credential/license number
          type: string
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      additionalProperties: false
    Descriptor:
      type: object
      properties:
        '@type':
          description: Type of the descriptor
          type: string
          enum:
          - beckn:Descriptor
          example: beckn:Descriptor
        beckn:longDesc:
          description: Detailed description of the item
          type: string
          example: Powerful gaming laptop with NVIDIA RTX graphics, fast SSD storage, and high-refresh display
        beckn:shortDesc:
          description: Short description of the item
          type: string
          example: High-performance gaming laptop with RTX graphics
        beckn:images:
          type: array
          items:
            type: string
            format: uri
        beckn:name:
          description: Name of the entity being described
          type: string
          example: Premium Gaming Laptop Pro
        beckn:mediaFile:
          description: Links to docs
          type: array
          items:
            $ref: '#/components/schemas/Document'
      required:
      - '@type'
    Eligibility:
      type: object
      properties:
        eligibleQuantity:
          type: object
          properties:
            max:
              type: number
            min:
              type: number
        eligibleRegion:
          type: string
      x-jsonld:
        '@id': schema:DefinedRegion|schema:QuantitativeValue
    Entitlement:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Entitlement
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:entitlementType:
          description: Type of entitlement (ticket, voucher, pass, token, etc.)
          type: string
        beckn:id:
          type: string
        beckn:number:
          description: Human-readable entitlement number
          type: string
        beckn:validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      additionalProperties: false
    Error:
      type: object
      properties:
        code:
          description: Error code
          type: string
          example: INVALID_SCHEMA_FIELD
        details:
          description: Additional error details
          type: object
        message:
          description: Human-readable error message
          type: string
          example: Field 'electronic:invalidField' not found in ElectronicItem schema
      required:
      - code
      - message
    ErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'
      required:
      - error
    Feature:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Feature
        beckn:category:
          $ref: '#/components/schemas/CategoryCode'
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          description: Identifier for the feature term
          type: string
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      additionalProperties: false
    Feedback:
      description: Feedback
      type: object
    Form:
      description: Describes a form
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Form
          x-jsonld:
            '@id': beckn:Form
        data:
          description: The form submission data
          type: object
          additionalProperties:
            type: string
        mime_type:
          description: This field indicates the nature and format of the form received by querying the url. MIME types are
            defined and standardized in IETF's RFC 6838.
          type: string
          enum:
          - text/html
          - application/xml
        submission_id:
          type: string
          format: uuid
        url:
          description: The URL from where the form can be fetched. The content fetched from the url must be processed as per
            the mime_type specified in this object. Once fetched, the rendering platform can choosed to render the form as-is
            as an embeddable element; or process it further to blend with the theme of the application. In case the interface
            is non-visual, the the render can process the form data and reproduce it as per the standard specified in the
            form.
          type: string
          format: uri
      required:
      - '@context'
      - '@type'
    Fulfillment:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Fulfillment
          x-jsonld:
            '@id': schema:Thing
        beckn:agent:
          description: 'The entity that directly performs the fulfillment'
          allOf:
            - $ref: '#/components/schemas/FulfillmentAgent'
        beckn:provider:
          description: 'The agency or organization that performs the fulfillment service'
          allOf:
            - $ref: '#/components/schemas/Provider'
        beckn:fulfillmentAttributes:
          description: 'Extensible set of domain-specific attributes describing the fulfillment'
          allOf:
            - $ref: '#/components/schemas/Attributes'
        beckn:docs:
          description: 'An attached set of docs related to the fulfillment of the order. It could be tickets, passes, shipment manifests, etc'
          type: array
          items:
            $ref: '#/components/schemas/Document'
        beckn:currentState:
          allOf:
            - $ref: '#/components/schemas/Descriptor'
          x-jsonld:
            '@id': 'beckn:fulfillmentState'
        beckn:id:
          description: Fulfillment identifier
          type: string
          x-jsonld:
            '@id': schema:identifier
        beckn:instructions:
          type: array
          items:
            $ref: '#/components/schemas/Descriptor'
        beckn:mode:
          description: 'Extensible set of attributes describing the mode of fulfillment. Varies with Industry Use Case'
          allOf:
            - $ref: '#/components/schemas/FulfillmentMode'
          x-jsonld:
            '@id': beckn:FulfillmentMode  
        beckn:participants:
          description: A list of participants who are entitled to receive the fulfillment of the order. By default, it is the consumer who placed the order  
          type: array
          items:
            $ref: '#/components/schemas/Participant'
          minItems: 1
        beckn:state:
          description: 'The current state of fulfillment'
          allOf:
            $ref: '#/components/schemas/State'
        beckn:stages:
          description: 'The various stages of the fulfillment'
          type: array
          items:
            $ref: '#/components/schemas/FulfillmentStage'
          minItems: 1
        beckn:trackingEnabled:
          description: Whether tracking is enabled / possible for this fulfillment
          type: boolean
      required:
      - '@context'
      - '@type'
      - beckn:mode
      additionalProperties: false
    FulfillmentAgent:
      description: The entity directly involved in fulfilling the order. It could be a person, a machine, a software application, or an AI Agent
      type: object
      properties:
        beckn:id:
          type: string
          x-jsonld:
            '@id': 'schema:identifier'
        beckn:name:
          type: string
          x-jsonld:
            '@id': 'schema:name'
        beckn:AgentAttributes:
          description: An extensible set of attributes that describe the agent of fulfillment
          allOf: 
            $ref: '#/components/schemas/Attributes'

    FulfillmentStage:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:FulfillmentStage
        beckn:id:
          description: A unique identifier for this stage of fulfillment
          type: string
        beckn:instructions:
          description: A set of instructions to follow during this stage of fulfillment
          type: array
          items:
            $ref: '#/components/schemas/Instruction'
        beckn:start:
          description: An extensible set of attributes that describe the criteria required to start this stage of fulfillment
          allOf: 
            $ref: '#/components/schemas/Attributes'
        beckn:end:
          description: An extensible set of attributes that describe the criteria required to end this stage of fulfillment
          allOf: 
            $ref: '#/components/schemas/Attributes'
        beckn:FulfillmentStageAttributes:
          description: An extensible set of attributes that describe this stage of fulfillment
          allOf: 
            $ref: '#/components/schemas/Attributes'
      x-jsonld:
        '@id': beckn:fulfillmentStage
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:location
      additionalProperties: false

    GeoJSONGeometry:
      description: "**GeoJSON geometry** per RFC 7946. Coordinates are in **EPSG:4326 (WGS-84)** and MUST follow **[longitude,\
        \ latitude, (altitude?)]** order.\nSupported types: - Point, LineString, Polygon - MultiPoint, MultiLineString, MultiPolygon\
        \ - GeometryCollection (uses `geometries` instead of `coordinates`)\nNotes: - For rectangles, use a Polygon with a\
        \ single linear ring where the first\n  and last positions are identical.\n- Circles are **not native** to GeoJSON.\
        \ For circular searches, use\n  `SpatialConstraint` with `op: s_dwithin` and a Point + `distanceMeters`,\n  or approximate\
        \ the circle as a Polygon.\n- Optional `bbox` is `[west, south, east, north]` in degrees.\n"
      type: object
      properties:
        bbox:
          description: Optional bounding box `[west, south, east, north]` in degrees.
          type: array
          minItems: 4
          maxItems: 4
        coordinates:
          description: 'Coordinates per RFC 7946 for all types **except** GeometryCollection. Order is **[lon, lat, (alt)]**.
            For Polygons, this is an array of linear rings; each ring is an array of positions.

            '
          type: array
        geometries:
          description: 'Member geometries when `type` is **GeometryCollection**.

            '
          type: array
          items:
            $ref: '#/components/schemas/GeoJSONGeometry'
        type:
          type: string
          enum:
          - Point
          - LineString
          - Polygon
          - MultiPoint
          - MultiLineString
          - MultiPolygon
          - GeometryCollection
      required:
      - type
      additionalProperties: true
      examples:
        - $ref: '../../examples/v2.1/GeoJSONGeometry.examples.yaml#/point'
        - $ref: '../../examples/v2.1/GeoJSONGeometry.examples.yaml#/polygon_rectangle'
        - $ref: '../../examples/v2.1/GeoJSONGeometry.examples.yaml#/geometry_collection'
    Instruction:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Instruction
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          type: string
        beckn:validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      additionalProperties: false
    Invoice:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Invoice
          x-jsonld:
            '@id': schema:Invoice
        beckn:dueDate:
          type: string
          x-jsonld:
            '@id': schema:paymentDueDate
          format: date
          nullable: true
        beckn:id:
          description: Stable invoice identifier (system id)
          type: string
          x-jsonld:
            '@id': schema:identifier
        beckn:invoiceAttributes:
          description: Attribute Pack for tax regime (e.g., GST/VAT), e-invoice refs, legal boilerplate, etc.
          allOf:
            - $ref: '#/components/schemas/Attributes'
        beckn:issueDate:
          type: string
          x-jsonld:
            '@id': schema:dateIssued
          format: date
        beckn:number:
          description: Human-visible invoice number
          type: string
          x-jsonld:
            '@id': schema:confirmationNumber
        beckn:payee:
          description: Seller / issuer of the invoice
          x-jsonld:
            '@id': schema:provider
          allOf:
            - $ref: '#/components/schemas/Provider/properties/beckn:id'
        beckn:payer:
          description: Buyer being invoiced
          x-jsonld:
            '@id': schema:customer
          allOf:
            - $ref: '#/components/schemas/Buyer/properties/beckn:id'
        beckn:priceComponents:
          type: array
          items:
            $ref: '#/components/schemas/PriceComponent'
        beckn:totals:
          description: Invoice grand totals (tax/shipping/discount components inside)
          x-jsonld:
            '@id': schema:priceSpecification
          allOf:
            - $ref: '#/components/schemas/PriceSpecification'
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:number
      - beckn:issueDate
      - beckn:totals
      - beckn:payee
      - beckn:payer
      additionalProperties: false
    Item:
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the core Item schema
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          description: Type of the core item
          type: string
          enum:
          - beckn:Item
        beckn:availabilityWindow:
          description: Time periods when the item is available
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        beckn:availableAt:
          description: Physical locations where the item is available
          type: array
          items:
            $ref: '#/components/schemas/Location'
        beckn:category:
          $ref: '#/components/schemas/CategoryCode'
        beckn:constraints:
          type: array
          items:
            $ref: '#/components/schemas/Constraint'
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
        beckn:id:
          description: Unique identifier for the item
          type: string
          example: gaming-laptop-001
        beckn:isActive:
          description: Whether the item is active
          type: boolean
          default: true
        beckn:itemAttributes:
          $ref: '#/components/schemas/Attributes'
        beckn:networkId:
          description: Array of network identifiers for the BAP (Beckn App Provider) that offers this item
          type: array
          items:
            type: string
          example:
          - bap.net/electronics
          - bap.net/tech
        beckn:policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        beckn:provider:
          $ref: '#/components/schemas/Provider'
        beckn:rateable:
          description: Whether the item can be rated by customers
          type: boolean
          example: true
        beckn:rating:
          $ref: '#/components/schemas/Rating'
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      - beckn:provider
      - beckn:itemAttributes
      additionalProperties: false
    Intent:
      description: A declaration of an intent to discover catalogs.
      type: object
      properties:
        text_search:
          description: Free text search query for items
          type: string
          example: gaming laptop premium tech
        filters:
          description: Filter criteria for items
          type: object
          properties:
            type:
              description: Type of filter expression
              type: string
              enum:
              - jsonpath
              default: jsonpath
            expression:
              description: Filter expression based on the specified type
              type: string
              example: $[?(@.rating.value >= 4.0 && @.electronic.brand.name == 'Premium Tech')]
          required:
          - type
          - expression
        spatial:
          description: Optional array of spatial constraints (CQL2-JSON semantics).
          type: array
          items:
            $ref: '#/components/schemas/SpatialConstraint'
        media_search:
          $ref: '#/components/schemas/MediaSearch'
      anyOf:
      - required:
        - text_search
      - required:
        - filters
      - required:
        - spatial
      - required:
        - filters
        - spatial
    MediaInput:
      description: Reference to an image, audio clip, or video used for multimodal search.
      type: object
      properties:
        id:
          description: Client-supplied identifier for this media input.
          type: string
        type:
          description: Media category.
          type: string
          enum:
          - image
          - audio
          - video
        url:
          description: HTTPS URL or data URI pointing to the media resource.
          type: string
          format: uri
        contentType:
          description: MIME type, e.g., image/jpeg, audio/mpeg, video/mp4.
          type: string
        textHint:
          description: Optional pre-extracted text (OCR/ASR) for search augmentation.
          type: string
        language:
          description: Language code (BCP-47) of `textHint` or spoken audio.
          type: string
        startMs:
          description: Optional start offset in milliseconds (for audio/video segments).
          type: integer
        endMs:
          description: Optional end offset in milliseconds (for audio/video segments).
          type: integer
      required:
      - type
      - url
      additionalProperties: false
    MediaSearchOptions:
      description: How the discovery engine should use the provided media inputs.
      type: object
      properties:
        goals:
          description: 'Desired processing goals for the media.

            '
          type: array
          items:
            type: string
            enum:
            - VISUAL_SIMILARITY
            - VISUAL_OBJECT_DETECT
            - TEXT_FROM_IMAGE
            - TEXT_FROM_AUDIO
            - SEMANTIC_AUDIO_MATCH
            - SEMANTIC_VIDEO_MATCH
        augmentTextSearch:
          description: 'Whether to append extracted text from OCR/ASR to `textSearch`.

            '
          type: boolean
          default: true
        restrictResultsToMediaProximity:
          description: 'Restrict results to spatial proximity of media-derived coordinates (e.g., EXIF GPS tags).

            '
          type: boolean
          default: false
      additionalProperties: false
    Location:
      description: 'A **place** represented by **GeoJSON geometry** (Point/Polygon/Multi*) and optional human-readable `address`.
        This unifies all Beckn location fields into a single, widely-adopted representation (GeoJSON).

        '
      type: object
      properties:
        '@type':
          type: string
          enum:
          - beckn:Location
        address:
          description: Optional human-readable address for the same place/area.
          oneOf:
          - type: string
          - $ref: '#/components/schemas/Address'
        geo:
          $ref: '#/components/schemas/GeoJSONGeometry'
      required:
      - geo
      additionalProperties: false
      examples:
        - $ref: '../../examples/v2.1/Location.examples.yaml#/site_point'
        - $ref: '../../examples/v2.1/Location.examples.yaml#/service_area'
    Offer:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Offer
          x-jsonld:
            '@id': schema:Offer
        beckn:acceptedPaymentMethod:
          $ref: '#/components/schemas/AcceptedPaymentMethod'
        beckn:addOnItems:
          description: Optional extras modeled as items (e.g., toppings, accessories)
          type: array
          items:
            $ref: '#/components/schemas/Item/properties/beckn:id'
          x-jsonld:
            '@id': schema:addOn
        beckn:addOns:
          description: Optional extra Offers that can be attached (e.g., warranty, gift wrap)
          type: array
          items:
            $ref: '#/components/schemas/Offer/properties/beckn:id'
          x-jsonld:
            '@id': schema:addOn
        beckn:constraints:
          type: array
          items:
            $ref: '#/components/schemas/Constraint'
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:eligibleRegion:
          description: Regions where the offer is eligible
          type: array
          items:
            $ref: '#/components/schemas/Location'
        beckn:features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
        beckn:id:
          description: Unique id for this offer
          type: string
          x-jsonld:
            '@id': schema:identifier
        beckn:isActive:
          description: Whether the offer is active
          type: boolean
          default: true
        beckn:items:
          description: Base item(s) the offer applies to (single or bundle)
          type: array
          items:
            $ref: '#/components/schemas/Item/properties/beckn:id'
          x-jsonld:
            '@id': schema:itemOffered
          minItems: 1
        beckn:offerAttributes:
          description: Attribute Pack attachment (pricing models, discounts, rail terms, etc.)
          allOf:
            - $ref: '#/components/schemas/Attributes'
        beckn:policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        beckn:price:
          description: Price snapshot; detailed models can live in offerAttributes
          x-jsonld:
            '@id': schema:priceSpecification
          allOf:
            - $ref: '#/components/schemas/PriceSpecification'
        beckn:provider:
          description: Seller / provider of this offer
          x-jsonld:
            '@id': schema:seller
          allOf:
            - $ref: '#/components/schemas/Provider/properties/beckn:id'
        beckn:validity:
          description: Offer validity window
          x-jsonld:
            '@id': schema:availabilityStarts|schema:availabilityEnds
          allOf:
            - $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      - beckn:provider
      - beckn:items
      additionalProperties: false
    Order:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Order
          x-jsonld:
            '@id': schema:Order
        beckn:acceptedOffers:
          description: Offers accepted at order-level (optional if captured per line)
          type: array
          items:
            $ref: '#/components/schemas/Offer'
          x-jsonld:
            '@id': schema:acceptedOffer
        beckn:consumer:
          x-jsonld:
            '@id': schema:customer
          allOf:
            - $ref: '#/components/schemas/Consumer'
        beckn:entitlements:
          type: array
          items:
            $ref: '#/components/schemas/Entitlement'
        beckn:fulfillment:
          description: Parcel delivery or reservation summary
          x-jsonld:
            '@id': schema:ParcelDelivery|schema:Reservation
          allOf:
            - $ref: '#/components/schemas/Fulfillment'
        beckn:id:
          type: string
          x-jsonld:
            '@id': schema:identifier
        beckn:invoice:
          description: Invoice reference/summary
          x-jsonld:
            '@id': schema:Invoice
          allOf:
            - $ref: '#/components/schemas/Invoice/properties/beckn:id'
        beckn:orderAttributes:
          description: Order-level Attribute Pack (vertical/regulatory specifics)
          allOf:
            - $ref: '#/components/schemas/Attributes'
        beckn:orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          x-jsonld:
            '@id': schema:orderItem
          minItems: 1
        beckn:orderNumber:
          description: Human-visible order number
          type: string
          x-jsonld:
            '@id': schema:orderNumber
        beckn:orderStatus:
          description: Order status/state
          type: string
          enum:
          - CREATED
          - PENDING
          - CONFIRMED
          - INPROGRESS
          - PARTIALLYFULFILLED
          - COMPLETED
          - CANCELLED
          - REJECTED
          - FAILED
          - RETURNED
          - REFUNDED
          - ONHOLD
          x-jsonld:
            '@id': beckn:orderStatus
        beckn:orderValue:
          description: Order totals snapshot (derivable from lines; optional)
          x-jsonld:
            '@id': schema:priceSpecification
          allOf:
            - $ref: '#/components/schemas/PriceSpecification'
        beckn:participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
        beckn:paymentTerms:
          description: Method/status; rail-specific payloads go to packs
          x-jsonld:
            '@id': schema:PaymentMethod|schema:PaymentStatusType
          allOf:
            - $ref: '#/components/schemas/PaymentTerms'
        beckn:policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        beckn:provider:
          x-jsonld:
            '@id': schema:seller
          allOf:
            - $ref: '#/components/schemas/Provider'
        beckn:state:
          $ref: '#/components/schemas/State'
      required:
      - '@context'
      - '@type'
      - beckn:orderStatus
      - beckn:provider
      - beckn:consumer
      - beckn:orderItems
      additionalProperties: false
    OrderItem:
      type: object
      properties:
        beckn:acceptedOffer:
          description: Offer applied to this line (if different from order-level)
          x-jsonld:
            '@id': schema:acceptedOffer
          allOf:
            - $ref: '#/components/schemas/Offer'
        beckn:lineId:
          description: Unique line id within order
          type: string
        beckn:orderItemAttributes:
          description: Line-level Attribute Pack (options, substitutions, ESG, etc.)
          allOf:
            - $ref: '#/components/schemas/Attributes'
        beckn:orderedItem:
          x-jsonld:
            '@id': schema:orderedItem
          allOf:
            - $ref: '#/components/schemas/Item/properties/beckn:id'
        beckn:price:
          description: Line price composition (unit/tax/delivery/discount)
          x-jsonld:
            '@id': schema:priceSpecification
          allOf:
            - $ref: '#/components/schemas/PriceSpecification'
        beckn:quantity:
          x-jsonld:
            '@id': beckn:quantity
          allOf:
            - $ref: '#/components/schemas/Quantity'
      required:
      - beckn:orderedItem
    Participant:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Participant
        beckn:credentials:
          type: array
          items:
            $ref: '#/components/schemas/Credential'
        beckn:displayName:
          type: string
        beckn:email:
          type: string
          format: email
        beckn:id:
          type: string
        beckn:rating:
          $ref: '#/components/schemas/Rating'
        beckn:role:
          description: Role of participant (buyer, recipient, rider, patient, operator, etc.)
          type: string
        beckn:skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
        beckn:telephone:
          type: string
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:role
      additionalProperties: false
    PaymentAction:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Payment
          x-jsonld:
            '@id': schema:Thing
        beckn:payer: 
          type: object
        beckn:payee:
          type: object
        beckn:amount:
          description: Amount associated with this payment action
          type: object
          properties:
            currency:
              type: string
              x-jsonld:
                '@id': schema:priceCurrency
            value:
              type: number
              x-jsonld:
                '@id': schema:price
        beckn:beneficiary:
          description: Who will be the beneficiary or recipient of the payment
          type: string
          enum:
          - BPP
          - BAP
          - BUYER
          x-jsonld:
            '@id': schema:beneficiary
          example: BPP
        beckn:id:
          description: Payment record identifier
          type: string
          x-jsonld:
            '@id': schema:identifier
        beckn:paidAt:
          description: When the last terminal event (capture/refund) happened
          type: string
          x-jsonld:
            '@id': schema:paymentDueDate
          format: date-time
          nullable: true
        beckn:paymentStatus:
          description: Payment lifecycle status (Pending | Authorized | Captured | Failed | Refunded | PartialRefund …)
          type: string
          enum:
          - INITIATED
          - PENDING
          - AUTHORIZED
          - CAPTURED
          - COMPLETED
          - FAILED
          - CANCELLED
          - REFUNDED
          - PARTIALLY_REFUNDED
          - CHARGEBACK
          - DISPUTED
          - EXPIRED
          - REVERSED
          - VOIDED
          - SETTLED
          - ON_HOLD
          - ADJUSTED
          x-jsonld:
            '@id': beckn:paymentStatus
        beckn:paymentURL:
          description: URL for payment processing/redirection
          type: string
          x-jsonld:
            '@id': schema:url
          format: uri
          example: https://payments.example.com/pay?transaction_id=123&amount=100
        beckn:state:
          $ref: '#/components/schemas/State'
        beckn:txnRef:
          description: PSP/gateway/bank transaction reference
          type: string
          x-jsonld:
            '@id': schema:transactionNumber
      required:
      - '@context'
      - '@type'
      - beckn:paymentStatus
      additionalProperties: false

    PaymentTerms:
      type: object
      properties:
        beckn:collectedBy:
          $ref: '#/components/schemas/PaymentCollector'
        beckn:paymentSchedule:
          $ref: '#/components/schemas/PaymentSchedule'
        beckn:payTo:
          $ref: '#/components/schemas/SettlementAccount'
        beckn:refundTo:
          $ref: '#/components/schemas/SettlementAccount'
        beckn:paymentAttributes:
          description: 'Rail-specific attribute pack (e.g., UPI: VPA/UTR; CARD: token/3DS; BNPL: plan/schedule)'
          $ref: '#/components/schemas/Attributes'

    PaymentCollector:
      description: The entity that is liable to collect the payment from the consumer
      type: string
      enum:
        - BAP
        - BPP
        - PROVIDER
        - FULFILLMENT_AGENT
        - THIRD_PARTY_AGENT

    Policy:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Policy
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:documents:
          description: Optional supporting documents/forms
          type: array
          items:
            $ref: '#/components/schemas/Form'
        beckn:id:
          description: Identifier for the policy
          type: string
        beckn:policyType:
          description: Type/kind of policy (extensible term)
          type: string
        beckn:validity:
          description: Validity window for this policy version
          allOf:
            - $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      additionalProperties: false
    PriceComponent:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:PriceComponent
        beckn:amount:
          type: number
        beckn:category:
          description: Component category (tax, fee, discount, etc.)
          allOf:
            - $ref: '#/components/schemas/CategoryCode'
        beckn:currency:
          type: string
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:id:
          type: string
      required:
      - '@context'
      - '@type'
      - beckn:id
      - beckn:descriptor
      - beckn:amount
      - beckn:currency
      additionalProperties: false
    PriceSpecification:
      type: object
      properties:
        applicableQuantity:
          x-jsonld:
            '@id': schema:eligibleQuantity
          allOf:
            - $ref: '#/components/schemas/Quantity'
        beckn:priceComponents:
          type: array
          items:
            $ref: '#/components/schemas/PriceComponent'
        components:
          description: Optional components (tax, shipping, discount, fee, surcharge)
          type: array
          items:
            type: object
            properties:
              currency:
                type: string
              description:
                type: string
              type:
                type: string
                enum:
                - UNIT
                - TAX
                - DELIVERY
                - DISCOUNT
                - FEE
                - SURCHARGE
              value:
                type: number
        currency:
          description: ISO 4217 code
          type: string
        value:
          description: Total value for this price specification
          type: number
      x-jsonld:
        '@id': schema:PriceSpecification
      additionalProperties: true
    Provider:
      type: object
      properties:
        beckn:alerts:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        beckn:descriptor:
          $ref: '#/components/schemas/Descriptor'
        beckn:features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
        beckn:id:
          description: Unique identifier for the provider
          type: string
          example: tech-store-001
        beckn:locations:
          description: Physical locations where the provider operates
          type: array
          items:
            $ref: '#/components/schemas/Location'
        beckn:policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        beckn:providerAttributes:
          $ref: '#/components/schemas/Attributes'
        beckn:rateable:
          description: Whether the provider can be rated by customers
          type: boolean
          example: true
        beckn:rating:
          $ref: '#/components/schemas/Rating'
        beckn:validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - beckn:id
      - beckn:descriptor
      additionalProperties: false
    Quantity:
      type: object
      properties:
        maxQuantity:
          description: Maximum quantity for this price
          type: number
          x-jsonld:
            '@id': schema:Number
          example: 100
        minQuantity:
          description: Minimum quantity for this price
          type: number
          x-jsonld:
            '@id': schema:Number
          example: 1
        unitCode:
          description: Unit code for the quoted price (e.g., KWH, MIN, H, MON)
          type: string
          x-jsonld:
            '@id': schema:unitCode
          example: KWH
        unitQuantity:
          description: Quantity of the unit
          type: number
          x-jsonld:
            '@id': schema:Number
          example: 1
        unitText:
          description: Unit for the quoted price (e.g., kWh, minute, hour, month)
          type: string
          x-jsonld:
            '@id': schema:unitText
          example: kWh
      x-jsonld:
        '@id': schema:QuantitativeValue
      additionalProperties: false
    Rating:
      type: object
      properties:
        '@type':
          description: Type of the rating
          type: string
          enum:
          - beckn:Rating
          example: beckn:Rating
        beckn:ratingCount:
          description: Number of ratings
          type: integer
          minimum: 0
          example: 1250
        beckn:ratingValue:
          description: Rating value (0-5)
          type: number
          minimum: 0
          maximum: 5
          example: 4.8
      required:
      - '@type'
    RatingInput:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:RatingInput
          x-jsonld:
            '@id': beckn:RatingInput
        bestRating:
          description: Maximum of the rating scale (default 5 if omitted).
          type: number
        category:
          description: What is being rated.
          type: string
          enum:
          - ORDER
          - FULFILLMENT
          - ITEM
          - PROVIDER
          - AGENT
          - OTHER
        feedback:
          type: object
          properties:
            comments:
              type: string
            tags:
              type: array
              items:
                type: string
          additionalProperties: false
        id:
          description: Target entity ID being rated (order/item/fulfillment/provider/agent).
          type: string
        ratingValue:
          description: Numeric rating value (legacy usually 1–5).
          type: number
          minimum: 0
        worstRating:
          description: Minimum of the rating scale (default 1 or 0 if omitted).
          type: number
      required:
      - '@context'
      - '@type'
      - id
      - ratingValue
      x-jsonld:
