        '@type': schema:ContactPoint
        schema:contactType: '"Customer Support"'
        schema:email: $.email
        schema:hoursAvailable: $.hours
        schema:name: $.name
        schema:telephone: $.phone
        schema:url: $.url
      additionalProperties: false
      examples:
        - $ref: '../../examples/v2.1/SupportInfo.examples.yaml#/basic'
    SupportMethod:
      type: string
    SupportTicket:
      type: object
    TimePeriod:
      description: Time window with date-time precision for availability/validity
      type: object
      properties:
        '@type':
          description: JSON-LD type for a date-time period
          type: string
          example: beckn:TimePeriod
        schema:endDate:
          description: End instant (exclusive or inclusive per domain semantics)
          type: string
          format: date-time
          example: '2025-12-31T23:59:59Z'
        schema:endTime:
          description: End time of the time period
          type: string
          format: time
          example: '22:00:00'
        schema:startDate:
          description: Start instant (inclusive)
          type: string
          format: date-time
          example: '2025-01-27T09:00:00Z'
        schema:startTime:
          description: Start time of the time period
          type: string
          format: time
          example: 09:00:00
      required:
      - '@type'
      anyOf:
      - required:
        - schema:startDate
      - required:
        - schema:endDate
      - required:
        - schema:startTime
        - schema:endTime
    TrackAction:
      description: Minimal schema.org TrackAction for clickable tracking.
      type: object
      properties:
        id:
          description: Tracking action identifier
          type: string
          x-jsonld:
            '@id': schema:identifier
        url:
          description: Tracking page URL
          type: string
          x-jsonld:
            '@id': schema:url
          format: uri
      x-jsonld:
        '@type': schema:TrackAction
      additionalProperties: true
    TrackingRequest:
      type: object
      properties:
        id:
          description: Tracking reference identifier
          type: string
        callbackUrl:
          description: Optional callback URL for streaming tracking coordinates/updates
          type: string
          format: uri
        mode_hint:
          description: Optional delivery mode for the tracking handle.
          type: string
          enum:
          - link_only
          - deep_link
          - webhook
          - ws_handle
      required:
      - id
    Tracking:
      description: Non-streaming tracking handle per legacy semantics (url/transport/status).
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        '@type':
          type: string
          enum:
          - beckn:Tracking
          x-jsonld:
            '@id': beckn:Tracking
        beckn:state:
          $ref: '#/components/schemas/State'
        expires_at:
          description: ISO 8601 expiry timestamp for the tracking handle.
          type: string
          format: date-time
        tl_method:
          description: Transport/method used to access the tracking handle.
          type: string
          enum:
          - http/get
          - http/post
          - http/redirect
          - ws/handle
          - custom
        trackingStatus:
          type: string
          enum:
          - ACTIVE
          - DISABLED
          - COMPLETED
        url:
          description: Link/handle to off-network tracking UI or endpoint.
          type: string
          format: uri
      required:
      - '@context'
      - '@type'
      - tl_method
      - url
      - trackingStatus
      x-jsonld:
        '@type': schema:TrackAction
        beckn:trackingStatus: $.trackingStatus
        schema:deliveryMethod: $.tl_method
        schema:target: $.url
      additionalProperties: false
      examples:
        - $ref: '../../examples/v2.1/Tracking.examples.yaml#/basic'
